# Per-user volume defaults shipped with the platform image.
#
# The runtime composes each Docker volume name as
#   {COMPOSE_PROJECT_NAME}_jupyterlab_{username}_{suffix}
# so this file only needs the suffix and its metadata.
#
# Operators can extend or override these defaults by mounting their own YAML
# file (same shape) at the path indicated by JUPYTERHUB_LAB_VOLUMES_DESCRIPTIONS_FILE.
# Per-key, per-field merge: if the operator's file omits 'description' for
# `home` they keep the platform default description; if they redefine `mount`
# their value wins. Operator-only suffixes (e.g. `models`) get added to the
# merged set verbatim.
#
# `role` = hub.volume.role label value stamped on the volume at spawn. Marks
# it a platform system volume so the portal identifies it by role, not name (name
# drifts). `lab-` prefix indicates where it belongs - a lab, vs hub volumes
# (shared, docker-proxy). Optional - defaults to the suffix when omitted.

home:
  mount: /home
  description: User home directory files, configurations
  role: lab-home

workspace:
  mount: /home/lab/workspace
  description: Project files, notebooks, code
  role: lab-workspace

cache:
  mount: /home/lab/.cache
  description: Temporary files, pip cache, conda cache
  role: lab-cache
