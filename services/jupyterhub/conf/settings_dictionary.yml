# Settings Dictionary
# Defines environment variables displayed on the admin Settings page
# Categories are top-level keys, each containing a list of settings
# Each setting has: name (env var), description (UI label), default (fallback value)

JupyterHub Core:
  - name: JUPYTERHUB_ADMIN
    description: Admin username
    default: admin

  - name: COMPOSE_PROJECT_NAME
    description: Docker compose project name - groups hub and user containers in `docker compose ls`, prefixes per-user volume names
    default: jupyterhub

  - name: JUPYTERHUB_BASE_URL
    description: Base URL path
    default: /jupyterhub

  - name: JUPYTERHUB_SIGNUP_ENABLED
    description: User self-registration (0=disabled, 1=enabled)
    default: "1"

  - name: JUPYTERHUB_SSL_ENABLED
    description: SSL/TLS (0=disabled, 1=enabled)
    default: "1"

  - name: JUPYTERHUB_AUTOGENERATED_PASSWORD_WORDS
    description: Number of words in auto-generated passwords
    default: "4"

  - name: JUPYTERHUB_AUTOGENERATED_PASSWORD_DELIMITER
    description: Delimiter in auto-generated passwords
    default: "-"

  - name: JUPYTERHUB_TIMEZONE
    description: IANA timezone (e.g. Europe/Warsaw), empty = UTC
    default: ""

Docker:
  - name: JUPYTERHUB_DOCKER_TIMEOUT
    description: Docker API timeout in seconds (for volume size fetch, etc.)
    default: "360"

  - name: JUPYTERHUB_CONTAINER_MAX_EXTRA_SPACE_GB
    description: Max container writable layer in GB before warning (0=disabled)
    default: "10"

  - name: JUPYTERHUB_VOLUME_MAX_TOTAL_SIZE_GB
    description: Max total volume size in GB before warning (0=disabled)
    default: "50"

  - name: JUPYTERHUB_MEMORY_MAX_USAGE_FRACTION
    description: Per-user memory warning threshold as fraction of host RAM (e.g. 0.25 = 25%)
    default: "0.25"

Docker Proxy (limited-docker users):
  - name: JUPYTERHUB_DOCKER_PROXY_SOCKET_DIR
    description: Path inside the hub container where the in-process proxy writes per-user listener sockets; backed by a named docker volume (no host path)
    default: /var/run/jupyterhub-docker-proxy-sockets

  - name: JUPYTERHUB_DOCKER_PROXY_USER_COMPOSE_PROJECT_TEMPLATE
    description: Python str.format template for per-user `com.docker.compose.project` label stamped on ad-hoc `docker run` containers when a docker-limited group enables it. Placeholders - {compose_project} (hub project), {username}. User's own `docker compose -p` is still respected when the group's allow-override is on
    default: "{username}_containers"

  - name: JUPYTERHUB_DOCKER_PROXY_LABEL_PREFIX
    description: Label namespace; proxy stamps `<prefix>.owner` and `<prefix>.managed` on its resources. All filtering keys off `<prefix>.owner`
    default: jupyterhub.docker.proxy

Docker Spawner:
  - name: JUPYTERHUB_NOTEBOOK_IMAGE
    description: User container image
    default: stellars/stellars-jupyterlab-ds:latest

  - name: JUPYTERHUB_NETWORK_NAME
    description: Docker network for containers
    default: jupyterhub_network

GPU:
  - name: JUPYTERHUB_GPU_ENABLED
    description: GPU support (0=disabled, 1=enabled, 2=auto-detect)
    default: "2"

  - name: JUPYTERHUB_NVIDIA_IMAGE
    description: CUDA image for GPU detection
    default: nvidia/cuda:13.0.2-base-ubuntu24.04

Services:
  - name: JUPYTERHUB_SERVICE_MLFLOW
    description: MLflow service (0=disabled, 1=enabled)
    default: "1"

  - name: JUPYTERHUB_SERVICE_RESOURCES_MONITOR
    description: Resources monitor service (0=disabled, 1=enabled)
    default: "1"

  - name: JUPYTERHUB_SERVICE_TENSORBOARD
    description: TensorBoard service (0=disabled, 1=enabled)
    default: "1"

Idle Culler:
  - name: JUPYTERHUB_IDLE_CULLER_ENABLED
    description: Idle culler (0=disabled, 1=enabled)
    default: "0"

  - name: JUPYTERHUB_IDLE_CULLER_TIMEOUT_MINUTES
    description: Idle timeout in minutes
    default: "1440"

  - name: JUPYTERHUB_IDLE_CULLER_INTERVAL
    description: Check interval in seconds
    default: "600"

  - name: JUPYTERHUB_IDLE_CULLER_MAX_AGE
    description: Max server age (0=unlimited)
    default: "0"

  - name: JUPYTERHUB_IDLE_CULLER_MAX_EXTENSION_MINUTES
    description: Max session extension in minutes per session
    default: "1440"

Abuse Protection:
  - name: JUPYTERHUB_RATELIMIT_AVERAGE
    description: Ingress requests per period per source IP (0=disabled)
    default: "100"

  - name: JUPYTERHUB_RATELIMIT_BURST
    description: Ingress burst allowance above average
    default: "200"

  - name: JUPYTERHUB_RATELIMIT_PERIOD
    description: Ingress rate measurement period
    default: "1s"

  - name: JUPYTERHUB_RATELIMIT_XFF_DEPTH
    description: X-Forwarded-For depth for real client IP (0 for direct exposure)
    default: "1"

  - name: JUPYTERHUB_CONCURRENT_SPAWN_LIMIT
    description: Max simultaneous user-server spawns
    default: "100"

  - name: JUPYTERHUB_ACTIVE_SERVER_LIMIT
    description: Max total running user servers (0=unlimited)
    default: "0"

  - name: JUPYTERHUB_LOGIN_MAX_FAILED_ATTEMPTS
    description: Failed logins before lockout (0=disabled)
    default: "5"

  - name: JUPYTERHUB_LOGIN_LOCKOUT_SECONDS
    description: Lockout window in seconds after failed attempts
    default: "600"

  - name: JUPYTERHUB_BLOCK_FILE_DOWNLOADS
    description: Default browser file-download policy for members (0=allow, 1=block) - applied only when no group configures downloads via its File Downloads section; a configuring group overrides this (highest-priority wins). Best-effort policy with user notification, not full exfiltration prevention
    default: "0"

Activity Monitor:
  - name: JUPYTERHUB_ACTIVITYMON_RETENTION_DAYS
    description: Sample retention period in days (1-365)
    default: "7"

  - name: JUPYTERHUB_ACTIVITYMON_HALF_LIFE
    description: Decay half-life in hours (1-168)
    default: "72"

  - name: JUPYTERHUB_ACTIVITYMON_INACTIVE_AFTER
    description: Minutes until user considered inactive (1-1440)
    default: "60"

  - name: JUPYTERHUB_ACTIVITYMON_TARGET_HOURS
    description: Target daily work hours for 100% activity score (1-24)
    default: "8"

  - name: JUPYTERHUB_ACTIVITYMON_SAMPLE_INTERVAL
    description: Activity sampling interval in seconds (60-86400)
    default: "600"

  - name: JUPYTERHUB_ACTIVITYMON_RESOURCES_UPDATE_INTERVAL
    description: Resource refresh interval in seconds (status, CPU, memory)
    default: "10"

  - name: JUPYTERHUB_ACTIVITYMON_VOLUMES_UPDATE_INTERVAL
    description: Volume sizes refresh interval in seconds (background)
    default: "3600"

  - name: JUPYTERHUB_ACTIVITYMON_CONTAINER_SIZE_INTERVAL
    description: Container size refresh interval in seconds (background)
    default: "300"

User Environment:
  - name: JUPYTERLAB_AUX_SCRIPTS_PATH
    description: Admin-managed startup scripts executed in user containers on launch
    default: ""

  - name: JUPYTERLAB_AUX_MENU_PATH
    description: Admin-managed custom menu definitions for JupyterLab UI
    default: ""

  - name: JUPYTERHUB_USER_VOLUMES_DESCRIPTIONS_FILE
    description: Path inside the hub container to an operator user-volume descriptions overlay YAML (suffix-keyed, with mount/description); merges over /srv/jupyterhub/volumes_dictionary.yml, operator fields win
    default: ""

  - name: JUPYTERHUB_LAB_SUDO_ENABLE_DEFAULT
    description: Default sudo for members (0=off, 1=on) - injected as JUPYTERLAB_SUDO_ENABLE into each lab when no group configures sudo via its Sudo Access section; a configuring group overrides this
    default: "1"

Branding:
  - name: JUPYTERLAB_SYSTEM_NAME
    description: Rebrand stellars-jupyterlab-ds mentions in welcome page, MOTD and toolbar header badge; empty = no rebrand
    default: ""

  - name: JUPYTERLAB_HEADER_CAPITALIZE_SYSTEM_NAME
    description: Uppercase the toolbar header badge (0/1)
    default: "1"

  - name: JUPYTERLAB_HEADER_SYSTEM_NAME_COLOR
    description: CSS color for the toolbar header badge text; empty = --jp-ui-font-color2
    default: ""

  - name: JUPYTERHUB_LOGO_URI
    description: Custom logo URI (file:// or URL)
    default: ""

  - name: JUPYTERHUB_FAVICON_URI
    description: Custom favicon URI (file:// or URL)
    default: ""

  - name: JUPYTERHUB_FAVICON_BUSY_URI
    description: Custom kernel-busy favicon for JupyterLab (file:// or URL); empty = JupyterLab default busy frames
    default: ""

  - name: JUPYTERHUB_LAB_MAIN_ICON_URI
    description: JupyterLab main icon (file:// or URL)
    default: ""

  - name: JUPYTERHUB_LAB_SPLASH_ICON_URI
    description: JupyterLab splash icon (file:// or URL)
    default: ""

  - name: STELLARS_JUPYTERHUB_VERSION
    description: Platform version
    default: unknown
