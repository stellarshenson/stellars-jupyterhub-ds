<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="{{ base_url }}brand/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - Optimum Hub</title>
    <script>
      // pre-paint theme guard (mirrors portal.html) so there is no flash.
      try {
        var m = localStorage.getItem('optimum-hub-theme');
        var d = window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = m === 'dark' || m === 'optimum-hub-dark' || ((m === 'system' || !m) && d);
        var el = document.documentElement;
        el.setAttribute('data-theme', dark ? 'optimum-hub-dark' : 'optimum-hub-light');
        el.style.colorScheme = dark ? 'dark' : 'light';
        el.style.background = dark ? '#252b32' : '#f5f7fa';
      } catch (e) {}
    </script>
    <script>
      // Auth-mode shell: the SPA reads authPage and renders the antd login screen,
      // which does a native POST to {{ base_url }}hub/login (unchanged NativeAuth
      // login logic). base_url / prefix / xsrf_token come from render_template;
      // optimum_entry_* are injected via c.JupyterHub.template_vars.
      window.jhdata = {
        base_url: "{{ base_url }}",
        prefix: "{{ prefix }}",
        xsrf_token: "{{ xsrf_token }}",
        authPage: "login",
        authError: {{ (login_error or '') | tojson }},
        authNext: {{ (next or '') | tojson }}
      };
    </script>
    {% if optimum_entry_css %}<link rel="stylesheet" crossorigin href="{{ base_url }}{{ optimum_entry_css }}" />{% endif %}
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <form method="post" action="{{ base_url }}hub/login?next={{ next }}" style="max-width:320px;margin:64px auto;font-family:sans-serif">
        <h1>Sign in</h1>
        {% if login_error %}<p style="color:#b00">{{ login_error }}</p>{% endif %}
        <input type="hidden" name="_xsrf" value="{{ xsrf_token }}" />
        <p><label>Username<br><input name="username" autocomplete="username" /></label></p>
        <p><label>Password<br><input type="password" name="password" autocomplete="current-password" /></label></p>
        <button type="submit">Sign in</button>
      </form>
    </noscript>
    {% if optimum_entry_js %}<script type="module" crossorigin src="{{ base_url }}{{ optimum_entry_js }}"></script>{% endif %}
  </body>
</html>
