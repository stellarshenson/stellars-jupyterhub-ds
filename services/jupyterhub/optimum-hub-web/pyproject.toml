# hatchling is major-pinned: the wheel hinges on the SPA bundle + vite
# `.vite/manifest.json` being captured by the `artifacts` glob below (gitignore
# semantics, where `**` traverses dot-directories). A hatchling major bump could
# change that glob engine, so cap it; the Docker smoke test independently asserts
# the manifest + entry JS resolve in the installed wheel.
[build-system]
requires = ["hatchling>=1.27,<2"]
build-backend = "hatchling.build"

[project]
name = "optimum-hub-web"
version = "4.0.5"
description = "Optimum Hub - JupyterHub-served React portal (UI bundle + hub integration)"
requires-python = ">=3.10"
# Runtime integration rides on the hub's own deps (jupyterhub.handlers.BaseHandler,
# tornado) which are always present in the hub image - no extra runtime deps.
dependencies = []

[project.optional-dependencies]
test = ["pytest"]

# The built SPA bundle lives at optimum_hub_web/static/ and is gitignored
# (regenerated by `make assets` / the Docker web-builder stage). `artifacts`
# forces it into the wheel even though VCS ignores it. Templates ship normally.
[tool.hatch.build]
artifacts = ["optimum_hub_web/static/**"]

[tool.hatch.build.targets.wheel]
packages = ["optimum_hub_web"]
