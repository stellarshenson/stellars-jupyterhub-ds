{% extends "page.html" %}
{% block main %}
  <div class="container">
    <div class="row">
      <div class="text-center">
        {% block message %}
          <p>Your server is starting up.</p>
          <p>You will be redirected automatically when it's ready for you.</p>
        {% endblock message %}
        <div class="progress">
          <div id="progress-bar"
               class="progress-bar"
               role="progressbar"
               aria-valuenow="0"
               aria-valuemin="0"
               aria-valuemax="100">
            <span class="visually-hidden"><span id="sr-progress">0%</span> Complete</span>
          </div>
        </div>
        <p id="progress-message"></p>
      </div>
    </div>
    <div class="row justify-content-center">
      <div class="col-md-8">
        <details id="progress-details">
          <summary>Event log</summary>
          <div id="progress-log"></div>
        </details>
      </div>
    </div>
  </div>
{% endblock main %}
{% block script %}
  {{ super() }}
  <script type="text/javascript">
    require(["jquery"], function($) {
      $("#refresh").click(function() {
        window.location.reload();
      });

      // hook up event-stream for progress
      var evtSource = new EventSource("{{ progress_url }}");
      var progressMessage = $("#progress-message");
      var progressBar = $("#progress-bar");
      var srProgress = $("#sr-progress");
      var progressLog = $("#progress-log");
      var pageDone = false;

      function reloadOnce() {
        if (pageDone) return;
        pageDone = true;
        try { evtSource.close(); } catch (_) {}
        window.location.reload();
      }

      evtSource.onmessage = function(e) {
        var evt = JSON.parse(e.data);
        if (evt.progress !== undefined) {
          // update progress
          var progText = evt.progress.toString();
          progressBar.attr('aria-valuenow', progText);
          srProgress.text(progText + '%');
          progressBar.css('width', progText + '%');
        }
        // update message
        var html_message;
        if (evt.html_message !== undefined) {
          progressMessage.html(evt.html_message);
          html_message = evt.html_message;
        } else if (evt.message !== undefined) {
          progressMessage.text(evt.message);
          html_message = progressMessage.html();
        }
        if (html_message) {
          progressLog.append(
            $("<div>")
            .addClass('progress-log-event')
            .html(html_message)
          );
        }

        if (evt.ready) {
          // reload the current page
          // which should result in a redirect to the running server
          reloadOnce();
        }

        if (evt.failed) {
          evtSource.close();
          // turn progress bar red
          progressBar.addClass('progress-bar-danger');
          // open event log for debugging
          $('#progress-details').prop('open', true);
        }
      };

      // Belt-and-suspenders: the EventSource above hangs forever in one
      // specific scenario - hub restarted, lab container is still alive
      // and CHP route was re-synced, but spawner._spawn_pending is False
      // (we never called spawner.start() for this lifecycle), so
      // _generate_progress() yields no events and the page sits on the
      // spinner indefinitely. Independently probe the hub-side /lab-ready
      // endpoint; the moment it reports the lab is responding, force a
      // reload. JupyterHub then redirects to the running server.
      var LAB_READY_POLL_INTERVAL_MS = 2000;
      var labReadyUrl = "{{ base_url }}api/users/{{ user.name }}/lab-ready";

      function getXsrfCookie() {
        var match = document.cookie.match(/(^| )_xsrf=([^;]+)/);
        return match ? match[2] : '';
      }

      function pollLabReady() {
        if (pageDone) return;
        $.ajax({
          url: labReadyUrl + '?_=' + Date.now(),
          type: 'GET',
          cache: false,
          headers: { 'X-XSRFToken': getXsrfCookie() },
          success: function(data) {
            if (data && data.ready) {
              reloadOnce();
            } else {
              setTimeout(pollLabReady, LAB_READY_POLL_INTERVAL_MS);
            }
          },
          error: function() {
            setTimeout(pollLabReady, LAB_READY_POLL_INTERVAL_MS);
          }
        });
      }
      setTimeout(pollLabReady, LAB_READY_POLL_INTERVAL_MS);

      // signal that page has finished loading (mostly for tests)
      window._jupyterhub_page_loaded = true;
    });
  </script>
{% endblock script %}
