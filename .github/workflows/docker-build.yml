name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  hadolint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/jupyterhub/Dockerfile.jupyterhub
          ignore: DL3007,DL3008,DL3013,DL3015,DL3059,DL3027,DL4006,SC2006,SC1008,DL3046,SC2153,DL3001,SC2016,SC2002

  provision_config_tests:
    name: Test 01_provision_config.sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run provisioning script tests
        run: bash services/jupyterhub/tests/test_provision_config.sh

  unit_tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: duoptimum-hub-services
        working-directory: services/jupyterhub/duoptimum-hub-services
        run: |
          python -m pip install --upgrade pip
          pip install . pytest pytest-asyncio
          pytest tests/ -v

      - name: duoptimum-docker-proxy
        working-directory: services/jupyterhub/duoptimum-docker-proxy
        run: |
          pip install . pytest pytest-asyncio
          pytest tests/ -v
