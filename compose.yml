# --------------------------------------------------------------------------------------------------
#
#   Stellars Jupyterhub DS Platform 
#   Project Home: https://github.com/stellarshenson/stellars-jupyterhub-ds
#   This compose file support both GPU and non-GPU platforms
#
#   Jupyter hub      - https://localhost/hub
#
# --------------------------------------------------------------------------------------------------

services:

  # Proxy for smart trafic routing to make it possible to host multiple similar containers 
  # exposing ports 80, 413 & 8080 to force docker to keep only one traefik service
  # traefik dashboard is available under http://localhost:8080/dashboard
  traefik:
    image: traefik:latest
    container_name: ${COMPOSE_PROJECT_NAME:-duoptimum-hub}-traefik
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--api.dashboard=true"
      - "--api.insecure=true"  
      - "--providers.file.directory=/certs" # any *.yml in this dir is loaded
      - "--providers.file.watch=true" # hot-reload on cert regeneration
      - "--serverstransport.insecureskipverify=true" # required for https passthrough
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # docker socket to use services labels
      - hub_certs:/certs # certificates (provisioned via hub service)
    depends_on:
      duoptimum-hub:
        condition: service_healthy
    networks:
      - hub_network
    restart: unless-stopped

  # service for management of a series of users and their jupyterlab
  # environments. it is internally managed via a proxy that redirects 
  # users to their dedicated environments
  duoptimum-hub:
    build:
      context: .
      dockerfile: services/jupyterhub/Dockerfile.jupyterhub
      args:
        - VERSION=${VERSION:-dev}
    image: stellars/duoptimum-hub:latest
    pull_policy: build
    container_name: ${COMPOSE_PROJECT_NAME:-duoptimum-hub}-hub
    volumes:
      - hub_certs:/certs # runtime cert dir Traefik watches
      - ./certs:/user-certs:ro # operator cert overlay (host folder; missing/empty -> auto-generate; populate ./certs to override)
      - ./config:/mnt/user_config:ro # operator config overlay (host folder; missing/empty -> built-in; populate ./config to override)
      - hub_data:/data # database and cookie secrets
      - hub_shared:/mnt/shared # shared volume across environments
      - hub_docker:/var/run/docker-proxy-sockets # per-user listener sockets; spawner mounts per-user
      - /var/run/docker.sock:/var/run/docker.sock:rw # docker socket to use spawner
    environment:
      # ============================== HUB-SPECIFIC ==============================
      # Core
      - JUPYTERHUB_ADMIN=admin # this username will be a JupyterHub admin
      - JUPYTERHUB_BASE_URL=/hub # default URL prefix
      - JUPYTERHUB_SIGNUP_ENABLED=1 # user self-registration: 0=disabled, 1=enabled
      - JUPYTERHUB_SSL_ENABLED=0 # direct SSL: 0=disabled (use Traefik), 1=enabled
      - JUPYTERHUB_AUTOGENERATED_PASSWORD_WORDS=4 # words in auto-generated passwords
      - JUPYTERHUB_AUTOGENERATED_PASSWORD_DELIMITER=- # delimiter for auto-generated passwords
      - JUPYTERHUB_NETWORK_NAME=${COMPOSE_PROJECT_NAME:-duoptimum-hub}_network # container network, namespaced by compose project
      - JUPYTERHUB_DOCKER_TIMEOUT=360 # Docker API timeout in seconds
      - JUPYTERHUB_TIMEZONE= # IANA timezone (e.g. Europe/Warsaw), empty = UTC
      - JUPYTERHUB_USER_CONFIG_FILE=jupyterhub_config.py # name of the root config file under /mnt/user_config (default jupyterhub_config.py); siblings copied alongside as importable helpers
      - JUPYTERHUB_USER_VOLUMES_DESCRIPTIONS_FILE= # optional path inside the container to an operator user-volume descriptions overlay YAML; merges with /srv/jupyterhub/volumes_dictionary.yml (operator wins per-field). Mount the overlay via compose_override.yml volumes:
      # Hub branding (hub login/home pages + portal)
      - JUPYTERHUB_BRANDING_STAGE= # environment-stage header badge: DEV/STG/TST/PRD or custom text; empty = no badge
      - JUPYTERHUB_BRANDING_LOGO_URI= # custom logo URI (file:// or http(s)://)
      - JUPYTERHUB_BRANDING_FAVICON_URI= # custom favicon URI (file:// or http(s)://)
      # Idle culler (disabled by default)
      - JUPYTERHUB_IDLE_CULLER_ENABLED=0 # 0=disabled, 1=enabled
      - JUPYTERHUB_IDLE_CULLER_TIMEOUT_MINUTES=1440 # minutes of inactivity before culling (default 24h)
      - JUPYTERHUB_IDLE_CULLER_INTERVAL=600 # check interval in seconds (default 10min)
      - JUPYTERHUB_IDLE_CULLER_MAX_AGE=0 # max server age in seconds (0=unlimited)
      - JUPYTERHUB_IDLE_CULLER_MAX_EXTENSION_MINUTES=1440 # max extension minutes per session (default 24h; extend UI works in whole hours)
      # Abuse protection - Layer A (Traefik rateLimit, consumed by labels below) + Layer B (hub limits)
      - JUPYTERHUB_RATELIMIT_AVERAGE=-100 # requests per period per source IP (0=disable rate limiting)
      - JUPYTERHUB_RATELIMIT_BURST=-200 # burst allowance above average
      - JUPYTERHUB_RATELIMIT_PERIOD=-1s # rate measurement period
      - JUPYTERHUB_RATELIMIT_XFF_DEPTH=-1 # X-Forwarded-For depth for real client IP (1=one trusted proxy in front; 0 for direct exposure)
      - JUPYTERHUB_CONCURRENT_SPAWN_LIMIT=100 # max simultaneous user-server spawns (spawn-storm protection)
      - JUPYTERHUB_ACTIVE_SERVER_LIMIT=0 # max total running user servers (0=unlimited)
      - JUPYTERHUB_LOGIN_MAX_FAILED_ATTEMPTS=5 # failed logins before lockout (0=lockout disabled)
      - JUPYTERHUB_LOGIN_LOCKOUT_SECONDS=600 # lockout window after exceeding failed attempts

      # ============================== LAB-SPECIFIC =============================
      # (configures the spawned user environment)
      - JUPYTERHUB_LAB_IMAGE=stellars/stellars-jupyterlab-ds:latest # user container image
      # GPU passthrough to labs
      - JUPYTERHUB_GPU_ENABLED=2 # 0=disabled, 1=enabled, 2=auto-detect
      - JUPYTERHUB_GPUINFO_NVIDIA_IMAGE=stellars/duoptimum-gpuinfo-nvidia:latest # GPU-info sidecar image (pulled from stellars/ DockerHub, built from base when absent)
      - JUPYTERHUB_GPUINFO_NVIDIA_CONTAINER_NAME=${COMPOSE_PROJECT_NAME:-duoptimum-hub}-gpuinfo-nvidia # sidecar container + DNS name (project-namespaced, like the other container_name values)
      - JUPYTERHUB_GPUINFO_NVIDIA_URL=http://${COMPOSE_PROJECT_NAME:-duoptimum-hub}-gpuinfo-nvidia:8000 # sidecar base URL; host MUST equal the container name above (compose can't cross-reference env entries, so the prefix is repeated)
      - JUPYTERHUB_GPUINFO_NETWORK_NAME=${COMPOSE_PROJECT_NAME:-duoptimum-hub}_gpuinfo_network # dedicated hub<->sidecar network
      # Services started inside the lab
      - JUPYTERHUB_LAB_SERVICE_MLFLOW=1 # MLflow experiment tracking
      - JUPYTERHUB_LAB_SERVICE_RESOURCES_MONITOR=1 # system resources monitor
      - JUPYTERHUB_LAB_SERVICE_TENSORBOARD=1 # TensorFlow training tracker
      # Per-user resource warning thresholds
      - JUPYTERHUB_LAB_CONTAINER_MAX_EXTRA_SPACE_GB=10 # max container writable layer in GB before warning
      - JUPYTERHUB_LAB_VOLUME_MAX_TOTAL_SIZE_GB=50 # max total volume size in GB before warning
      - JUPYTERHUB_LAB_MEMORY_MAX_USAGE_FRACTION=0.25 # per-user memory warning threshold as fraction of host RAM
      # Member defaults (a configuring group overrides each)
      - JUPYTERHUB_LAB_SUDO_ENABLE=1 # default only - member sudo (0/1); injected as JUPYTERLAB_SUDO_ENABLE
      - JUPYTERHUB_LAB_BLOCK_FILE_DOWNLOADS=0 # default only - member file-download policy (0=allow, 1=block)
      # Lab branding / icons
      - JUPYTERHUB_BRANDING_FAVICON_BUSY_URI= # custom kernel-busy favicon for JupyterLab (file:// or URL); empty = JupyterLab default busy frames
      - JUPYTERHUB_BRANDING_LAB_MAIN_ICON_URI= # JupyterLab main icon (file:// or URL)
      - JUPYTERHUB_BRANDING_LAB_SPLASH_ICON_URI= # JupyterLab splash icon (file:// or URL)
      # Admin-managed lab startup / menu (shared volume)
      - JUPYTERLAB_AUX_SCRIPTS_PATH=/mnt/shared/start-platform.d # admin-managed startup scripts for user environments
      - JUPYTERLAB_AUX_MENU_PATH=/mnt/shared/lab-utils.d # admin-managed custom menu definitions for JupyterLab

      # ================================= OTHER =================================
      - JUPYTERHUB_COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-duoptimum-hub}_hub # hub's compose project (volume namespace + hub labels); mapped from compose's own COMPOSE_PROJECT_NAME
      - JUPYTERHUB_LAB_COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-duoptimum-hub}_labs # compose project label for spawned labs; empty = same project as the hub, set to group user containers separately
      - CERTIFICATE_DOMAIN_NAME=localhost # self-signed certificate domain
      # Optional overrides (uncomment to set)
      - JUPYTERHUB_ADMIN_PASSWORD= # optional INITIAL admin password; pre-creates admin UserInfo on startup. Once admin changes their password, env is permanently ignored (verified via bcrypt.checkpw). Not listed in settings_dictionary.yml so it stays off the Settings page.
      - JUPYTERHUB_DOCKER_PROXY_USER_COMPOSE_PROJECT_TEMPLATE={username}_containers # per-user compose-project label template; rendered when a docker-limited group enables enforcement. Placeholders {compose_project} (hub project) and {username} (lab owner). Uncomment to override the Dockerfile default.
      - JUPYTERHUB_DOCKER_PROXY_LABEL_PREFIX={COMPOSE_PROJECT_NAME:-duoptimum-hub}.docker.proxy # label namespace; proxy stamps <prefix>.owner / <prefix>.managed. Override to dodge clashes with host labels.
      - JUPYTERHUB_DOCKER_PROXY_SOCKET_DIR=/var/run/docker-proxy-sockets # path inside the hub container where the in-process proxy writes per-user listener sockets. Backed by the hub_docker named volume (below); the hub discovers that volume's real daemon name from its own mounts at runtime - no name is hardcoded. Do not point this at a host bind.
      - JUPYTERLAB_SYSTEM_NAME=Duoptimum Hub # rebrand stellars-jupyterlab-ds in welcome page, MOTD, toolbar header badge; empty = no rebrand
      - JUPYTERLAB_HEADER_CAPITALIZE_SYSTEM_NAME=1 # uppercase the toolbar header badge (0/1)
      - JUPYTERLAB_HEADER_SYSTEM_NAME_COLOR= # CSS color for toolbar header badge text; empty = --jp-ui-font-color2
    labels:
      # Enable proxy support from Traefik
      - "traefik.enable=true"

      # ⚙  Jupyterhub Service (8000) - canonical base_url is /jupyterhub; /hub,
      # and /duoptimum-hub are accepted as transition aliases and
      # redirected to the canonical path by the hub-alias-redirect middleware below.
      - "traefik.http.routers.duoptimumhub-rtr.rule=Path(`/jupyterhub`) || PathPrefix(`/jupyterhub/`) || Path(`/hub`) || PathPrefix(`/hub/`) || Path(`/duoptimum-hub`) || PathPrefix(`/duoptimum-hub/`)"
      - "traefik.http.routers.duoptimumhub-rtr.entrypoints=websecure"
      - "traefik.http.routers.duoptimumhub-rtr.service=duoptimumhub-svc"
      - "traefik.http.routers.duoptimumhub-rtr.tls=true"
      - "traefik.http.services.duoptimumhub-svc.loadbalancer.server.scheme=http"
      - "traefik.http.services.duoptimumhub-svc.loadbalancer.server.port=8000"

      # 🔁 Transition aliases - /hub,/duoptimum-hub all 302 to the
      # canonical base_url (/jupyterhub) so old and short URLs keep working until the
      # canonical path is switched. JupyterHub serves only its base_url; subpath kept.
      - "traefik.http.middlewares.hub-alias-redirect.redirectregex.regex=^(https?://[^/]+)/(hub|duoptimum-hub)(/.*)?$$"
      - "traefik.http.middlewares.hub-alias-redirect.redirectregex.replacement=$${1}/jupyterhub$${3}"
      - "traefik.http.middlewares.hub-alias-redirect.redirectregex.permanent=false"

      # 🛡 Abuse protection - per-IP request rate limiting for hub AND all labs
      # (everything ingresses through CHP on :8000 behind this router). WebSocket-safe:
      # a kernel/terminal upgrade counts once at open; held connections are not re-counted.
      - "traefik.http.middlewares.duoptimumhub-ratelimit.ratelimit.average=${JUPYTERHUB_RATELIMIT_AVERAGE:-100}"
      - "traefik.http.middlewares.duoptimumhub-ratelimit.ratelimit.burst=${JUPYTERHUB_RATELIMIT_BURST:-200}"
      - "traefik.http.middlewares.duoptimumhub-ratelimit.ratelimit.period=${JUPYTERHUB_RATELIMIT_PERIOD:-1s}"
      - "traefik.http.middlewares.duoptimumhub-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=${JUPYTERHUB_RATELIMIT_XFF_DEPTH:-1}"
      - "traefik.http.routers.duoptimumhub-rtr.middlewares=hub-alias-redirect,duoptimumhub-ratelimit"
    networks:
      - hub_network
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f jupytehub > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  ## GPU-info sidecar (NVIDIA) is intentionally NOT a compose service: the hub
  ## self-starts it on demand over the docker socket (ensure_gpuinfo_sidecar),
  #
  ## watchtower for automatic docker image refresh
  ## exposing port to force docker to allow only one instance of service
  watchtower:
    container_name: ${COMPOSE_PROJECT_NAME:-duoptimum-hub}-watchtower
    image: nickfedor/watchtower:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=false" # exclude from self-updates
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw # to control docker and refresh images
    command: --cleanup --monitor-only --schedule "0 0 0 * * *" # daily at midnight UTC (6-field cron with seconds), pull only (no restart)
    security_opt:
      - seccomp:unconfined #optional
    depends_on:
      duoptimum-hub:
        condition: service_healthy
      traefik:
        condition: service_started
    ports:
      - "9911:9911"
    networks:
      - hub_network
    restart: unless-stopped
    privileged: true

volumes:
  hub_data:   # holds hub users, config, activity etc...
  hub_certs:  # holds certificates used by the platform (autogenerated or provisioned)
  hub_shared: # holds a shared volume / drive for users to collaborate via, it can be mapped to s3 or cifs
  hub_docker: # holds the in-process docker-proxy's per-user listener sockets; subpath-mounted into each user lab

networks:
  hub_network:
    name: ${COMPOSE_PROJECT_NAME:-duoptimum-hub}_hub_network  # hub network name namespaced for hub

  # gpuinfo (the hub<->GPU-info sidecar network) is deliberately NOT
  # declared here: the hub creates and owns it at runtime via ensure_gpuinfo_sidecar.
  # Declaring it caused "network ... was not created by compose / incorrect label"
  # conflicts with the hub-created network on boot.

