# --------------------------------------------------------------------------------------------------
#   Stellars Jupyterhub DS Platform
#   Home: https://github.com/stellarshenson/stellars-jupyterhub-ds
#   Supports GPU + non-GPU hosts. Hub: https://localhost/hub
# --------------------------------------------------------------------------------------------------

services:

  # Traefik: routes traffic, TLS, one instance (ports 80/443/8080). Dashboard http://localhost:8080/dashboard
  traefik:
    image: traefik:latest
    container_name: ${COMPOSE_PROJECT_NAME:-duoptimum-hub}-traefik
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.file.directory=/certs" # load any *.yml here
      - "--providers.file.watch=true" # hot-reload on cert regen
      - "--serverstransport.insecureskipverify=true" # https passthrough
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # docker socket for service labels
      - hub_certs:/certs # certs (hub-provisioned)
    depends_on:
      duoptimum-hub:
        condition: service_healthy
    networks:
      - hub_network
    restart: unless-stopped

  # Hub: manages users + their jupyterlab envs; proxies each user to their own env.
  duoptimum-hub:
    build:
      context: .
      dockerfile: services/jupyterhub/Dockerfile.jupyterhub
      args:
        - VERSION=${VERSION:-dev}
    image: stellars/duoptimum-hub:latest
    pull_policy: build
    container_name: ${COMPOSE_PROJECT_NAME:-duoptimum-hub}-hub
    volumes:
      - hub_certs:/certs # runtime cert dir Traefik watches
      - ./certs:/user-certs:ro # operator cert overlay (missing/empty -> auto-generate)
      - ./config:/mnt/user_config:ro # operator config overlay (missing/empty -> built-in)
      - hub_data:/data # database + cookie secrets
      - hub_shared:/mnt/shared # shared volume across envs
      - hub_docker:/var/run/docker-proxy-sockets # per-user listener sockets; spawner mounts per-user
      - /var/run/docker.sock:/var/run/docker.sock:rw # docker socket for spawner
    environment:
      # ===================== TEMPLATE PLACEHOLDERS =====================
      # Some values are TEMPLATES with {placeholders} the HUB resolves at runtime - never
      # hardcode the resolved value. Filled where used (NOT shell ${...} compose vars):
      #   {hostname} - address hub DISCOVERS for a container it manages (e.g. gpuinfo sidecar IP), at boot
      #   {compose}  - hub's compose project, DISCOVERED at boot from hub's own container label
      #   {username} - lab owner; resolved per-spawn
      #   {network}  - net name resolved per-context (role=lab net for the lab var, role=gpuinfo for the sidecar var)
      # =================================================================
      # ============================== HUB-SPECIFIC ==============================
      # Core
      - JUPYTERHUB_ADMIN=admin # JupyterHub admin username
      - JUPYTERHUB_BASE_URL=/hub # URL prefix
      - JUPYTERHUB_SIGNUP_ENABLED=1 # self-registration: 0=off, 1=on
      - JUPYTERHUB_SSL_ENABLED=0 # direct SSL: 0=off (use Traefik), 1=on
      - JUPYTERHUB_AUTOGENERATED_PASSWORD_WORDS=4 # words in auto-gen passwords
      - JUPYTERHUB_AUTOGENERATED_PASSWORD_DELIMITER=- # delimiter in auto-gen passwords
      # JUPYTERHUB_NETWORK_NAME not set here - baked as {network} (Dockerfile), resolved to the
      # role=lab net (hub_network label below). Set only to override.
      - JUPYTERHUB_DOCKER_TIMEOUT=360 # Docker API timeout (s)
      - JUPYTERHUB_TIMEZONE= # IANA tz (e.g. Europe/Warsaw), empty = UTC
      - JUPYTERHUB_USER_CONFIG_FILE=jupyterhub_config.py # root config under /mnt/user_config; siblings copied as helpers
      - JUPYTERHUB_USER_VOLUMES_DESCRIPTIONS_FILE= # optional volume-descriptions overlay YAML; merges over volumes_dictionary.yml (operator wins). Mount via compose_override.yml
      # Hub branding (login/home + portal)
      - JUPYTERHUB_BRANDING_STAGE= # stage badge: DEV/STG/TST/PRD or text; empty = none
      - JUPYTERHUB_BRANDING_LOGO_URI= # logo URI (file:// or http(s)://)
      - JUPYTERHUB_BRANDING_FAVICON_URI= # favicon URI (file:// or http(s)://)
      # Idle culler (off by default)
      - JUPYTERHUB_IDLE_CULLER_ENABLED=0 # 0=off, 1=on
      - JUPYTERHUB_IDLE_CULLER_TIMEOUT_MINUTES=1440 # idle minutes before cull (24h)
      - JUPYTERHUB_IDLE_CULLER_INTERVAL=600 # check interval (s)
      - JUPYTERHUB_IDLE_CULLER_MAX_AGE=0 # max server age (s), 0=unlimited
      - JUPYTERHUB_IDLE_CULLER_MAX_EXTENSION_MINUTES=1440 # max extension per session (24h; extend UI in whole hours)
      # Abuse protection - Layer A (Traefik rateLimit, see labels) + Layer B (hub limits)
      - JUPYTERHUB_RATELIMIT_AVERAGE=100 # requests/period/source IP (0=off)
      - JUPYTERHUB_RATELIMIT_BURST=200 # burst above average
      - JUPYTERHUB_RATELIMIT_PERIOD=1s # measurement period
      - JUPYTERHUB_RATELIMIT_XFF_DEPTH=1 # X-Forwarded-For depth (1=one proxy, 0=direct)
      - JUPYTERHUB_CONCURRENT_SPAWN_LIMIT=100 # max simultaneous spawns (spawn-storm guard)
      - JUPYTERHUB_ACTIVE_SERVER_LIMIT=0 # max running servers (0=unlimited)
      - JUPYTERHUB_LOGIN_MAX_FAILED_ATTEMPTS=5 # failed logins before lockout (0=off)
      - JUPYTERHUB_LOGIN_LOCKOUT_SECONDS=600 # lockout window after fails

      # ============================== LAB-SPECIFIC =============================
      # (configures the spawned user env)
      - JUPYTERHUB_LAB_IMAGE=stellars/stellars-jupyterlab-ds:latest # user container image
      - JUPYTERHUB_LAB_CONTAINER_NAME_TEMPLATE=jupyterlab-{username} # lab name template ({username}); spawner + hub lookups read same var (no hardcoded prefix)
      # GPU passthrough to labs
      - JUPYTERHUB_GPU_ENABLED=1 # 0=off, 1=autodetect (GPU on only when detected)
      # Sidecar IMAGE + CONTAINER NAME baked as image defaults (Dockerfile) + declared on the
      # gpuinfo-nvidia service below - not duplicated here. Override via compose_override.yml.
      - JUPYTERHUB_GPUINFO_NVIDIA_URL=http://{hostname}:8000 # sidecar base URL TEMPLATE; {hostname} filled at boot with discovered sidecar address
      # JUPYTERHUB_GPUINFO_NETWORK_NAME not set here - baked as {network} (Dockerfile), resolved
      # to the role=gpuinfo net (hub_gpuinfo_network label below). Set only to override.
      # Services started in the lab
      - JUPYTERHUB_LAB_SERVICE_MLFLOW=1 # MLflow tracking
      - JUPYTERHUB_LAB_SERVICE_RESOURCES_MONITOR=1 # resources monitor
      - JUPYTERHUB_LAB_SERVICE_TENSORBOARD=1 # TensorBoard
      # Per-user resource warning thresholds
      - JUPYTERHUB_LAB_CONTAINER_MAX_EXTRA_SPACE_GB=10 # max container writable layer (GB) before warning
      - JUPYTERHUB_LAB_VOLUME_MAX_TOTAL_SIZE_GB=50 # max total volume size (GB) before warning
      - JUPYTERHUB_LAB_MEMORY_MAX_USAGE_FRACTION=0.25 # per-user mem warning as fraction of host RAM
      # Member defaults (a configuring group overrides each)
      - JUPYTERHUB_LAB_SUDO_ENABLE=1 # default only - member sudo (0/1); -> JUPYTERLAB_SUDO_ENABLE
      - JUPYTERHUB_LAB_BLOCK_FILE_DOWNLOADS=0 # default only - downloads (0=allow, 1=block)
      # Lab branding / icons
      - JUPYTERHUB_BRANDING_FAVICON_BUSY_URI= # kernel-busy favicon (file:// or URL); empty = JupyterLab default
      - JUPYTERHUB_BRANDING_LAB_MAIN_ICON_URI= # JupyterLab main icon (file:// or URL)
      - JUPYTERHUB_BRANDING_LAB_SPLASH_ICON_URI= # JupyterLab splash icon (file:// or URL)
      # Admin-managed lab startup / menu (shared volume)
      - JUPYTERLAB_AUX_SCRIPTS_PATH=/mnt/shared/start-platform.d # admin startup scripts for envs
      - JUPYTERLAB_AUX_MENU_PATH=/mnt/shared/lab-utils.d # admin custom menu defs for JupyterLab

      # ================================= OTHER =================================
      # Hub's own compose project not passed here - hub discovers it at boot from its own
      # com.docker.compose.project label (all services share one project).
      - JUPYTERHUB_LAB_COMPOSE_PROJECT_NAME={compose}_labs # compose label for labs; {compose} = discovered hub project; empty = same as hub
      - CERTIFICATE_DOMAIN_NAME=localhost # self-signed cert domain
      # Optional overrides (uncomment to set)
      - JUPYTERHUB_ADMIN_PASSWORD= # optional INITIAL admin password; seeds admin on boot. Once admin changes it, env ignored (bcrypt.checkpw). Off the Settings page.
      - JUPYTERHUB_DOCKER_PROXY_USER_COMPOSE_PROJECT_TEMPLATE={username}_containers # per-user compose label when a docker-limited group enforces it. {compose}, {username}. Override the Dockerfile default.
      - JUPYTERHUB_DOCKER_PROXY_LABEL_PREFIX=duoptimum.docker.proxy # label namespace (from duoptimum-docker-proxy); proxy stamps <prefix>.owner / <prefix>.managed. Override to dodge host-label clashes.
      - JUPYTERHUB_DOCKER_PROXY_SOCKET_DIR=/var/run/docker-proxy-sockets # in-hub path for per-user listener sockets. Backed by hub_docker volume (below); hub finds its daemon name from own mounts. Not a host bind.
      - JUPYTERLAB_SYSTEM_NAME=Duoptimum Hub # rebrand stellars-jupyterlab-ds (welcome, MOTD, header badge); empty = none
      - JUPYTERLAB_HEADER_CAPITALIZE_SYSTEM_NAME=1 # uppercase header badge (0/1)
      - JUPYTERLAB_HEADER_SYSTEM_NAME_COLOR= # header badge text color; empty = --jp-ui-font-color2
    labels:
      # Enable Traefik proxy
      - "traefik.enable=true"

      # Hub service (8000) - canonical base_url /hub; /jupyterhub + /duoptimum-hub are
      # transition aliases, redirected to canonical by hub-alias-redirect below.
      - "traefik.http.routers.duoptimumhub-rtr.rule=Path(`/hub`) || PathPrefix(`/hub/`) || Path(`/jupyterhub`) || PathPrefix(`/jupyterhub/`) || Path(`/duoptimum-hub`) || PathPrefix(`/duoptimum-hub/`)"
      - "traefik.http.routers.duoptimumhub-rtr.entrypoints=websecure"
      - "traefik.http.routers.duoptimumhub-rtr.service=duoptimumhub-svc"
      - "traefik.http.routers.duoptimumhub-rtr.tls=true"
      - "traefik.http.services.duoptimumhub-svc.loadbalancer.server.scheme=http"
      - "traefik.http.services.duoptimumhub-svc.loadbalancer.server.port=8000"

      # Aliases - /jupyterhub, /duoptimum-hub 302 to canonical base_url (/hub). Subpath kept.
      - "traefik.http.middlewares.hub-alias-redirect.redirectregex.regex=^(https?://[^/]+)/(jupyterhub|duoptimum-hub)(/.*)?$$"
      - "traefik.http.middlewares.hub-alias-redirect.redirectregex.replacement=$${1}/hub$${3}"
      - "traefik.http.middlewares.hub-alias-redirect.redirectregex.permanent=false"

      # Abuse protection - per-IP rate limit for hub + all labs (all ingress via CHP :8000).
      # WebSocket-safe: upgrade counts once at open; held connections not re-counted.
      - "traefik.http.middlewares.duoptimumhub-ratelimit.ratelimit.average=${JUPYTERHUB_RATELIMIT_AVERAGE:-100}"
      - "traefik.http.middlewares.duoptimumhub-ratelimit.ratelimit.burst=${JUPYTERHUB_RATELIMIT_BURST:-200}"
      - "traefik.http.middlewares.duoptimumhub-ratelimit.ratelimit.period=${JUPYTERHUB_RATELIMIT_PERIOD:-1s}"
      - "traefik.http.middlewares.duoptimumhub-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=${JUPYTERHUB_RATELIMIT_XFF_DEPTH:-1}"
      - "traefik.http.routers.duoptimumhub-rtr.middlewares=hub-alias-redirect,duoptimumhub-ratelimit"
    networks:
      - hub_network
      - hub_gpuinfo_network # hub<->sidecar; hub attaches, sidecar joins too
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f jupyterhub > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # GPU-info sidecar (NVIDIA). DECLARED here so image + build + wiring are explicit, but gated
  # behind the `gpuinfo` profile so `docker compose up` does NOT start it: the HUB owns its
  # lifecycle over the docker socket (ensure_gpuinfo_sidecar) - starts only when GPU enabled,
  # removes on shutdown, applies the nvidia runtime conditionally (portable to non-GPU hosts).
  # build+image -> `docker compose build` makes the image locally (hub never pulls at boot).
  # Manual `docker compose --profile gpuinfo up` works on a GPU host for debugging.
  gpuinfo-nvidia:
    build:
      context: .
      dockerfile: services/jupyterhub/gpuinfo-nvidia/Dockerfile
      target: target
    image: stellars/duoptimum-gpuinfo-nvidia:latest
    pull_policy: build
    container_name: gpuinfo-nvidia # MUST match JUPYTERHUB_GPUINFO_NVIDIA_CONTAINER_NAME (name hub gives the sidecar)
    profiles:
      - gpuinfo # not in any default profile -> never auto-started; hub-managed
    labels:
      duoptimum.container.role: "gpuinfo" # MUST match JUPYTERHUB_GPUINFO_CONTAINER_ROLE_LABEL; hub mirrors it on the sidecar it creates
    # runtime env (NVIDIA_*, GPUINFO_PORT), port + cmd baked in the image - not redeclared here
    runtime: nvidia # GPU access via nvidia runtime (host must register it)
    networks:
      - hub_gpuinfo_network
    restart: unless-stopped

  ## Watchtower - daily image refresh (monitor-only); single instance via port
  watchtower:
    container_name: ${COMPOSE_PROJECT_NAME:-duoptimum-hub}-watchtower
    image: nickfedor/watchtower:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=false" # exclude from self-updates
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw # control docker, refresh images
    command: --cleanup --monitor-only --schedule "0 0 0 * * *" # daily midnight UTC (6-field cron), pull only (no restart)
    security_opt:
      - seccomp:unconfined #optional
    depends_on:
      duoptimum-hub:
        condition: service_healthy
      traefik:
        condition: service_started
    ports:
      - "9911:9911"
    networks:
      - hub_network
    restart: unless-stopped
    privileged: true

volumes:
  hub_data:   # hub users, config, activity
  hub_certs:  # platform certs (autogenerated or provisioned)
  hub_shared: # shared volume for users (can map to s3/cifs)
  hub_docker: # in-process docker-proxy per-user sockets; subpath-mounted per lab

networks:
  # hub_network = hub<->lab net spawned labs join. Role label lets hub DISCOVER its real name
  # at boot (resolve_self_network_by_label, scoped to hub's own attachments) - no name to drift.
  hub_network:
    name: ${COMPOSE_PROJECT_NAME:-duoptimum-hub}_hub_network  # namespaced hub net name
    labels:
      duoptimum.network.role: "lab" # MUST match JUPYTERHUB_NETWORK_ROLE_LABEL_KEY=JUPYTERHUB_LAB_NETWORK_ROLE_LABEL

  # hub<->GPU-info sidecar net. Compose OWNS/creates it (driver + attachments managed here);
  # role label lets hub DISCOVER its real name at boot. Hub joins it + runs the sidecar on it;
  # labs are on hub_network only, so they cannot reach it.
  hub_gpuinfo_network:
    name: ${COMPOSE_PROJECT_NAME:-duoptimum-hub}_hub_gpuinfo_network
    labels:
      duoptimum.network.role: "gpuinfo" # MUST match JUPYTERHUB_NETWORK_ROLE_LABEL_KEY=JUPYTERHUB_GPUINFO_NETWORK_ROLE_LABEL
