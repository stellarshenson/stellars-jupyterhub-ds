# --------------------------------------------------------------------------------------------------
#   Stellars Jupyterhub DS Platform
#   Home: https://github.com/stellarshenson/stellars-jupyterhub-ds
#   Supports GPU + non-GPU hosts. Hub: https://localhost/hub
# --------------------------------------------------------------------------------------------------
#   hub.* RESOURCE LABELS - stamped on volumes, networks and hub-managed containers:
#     .role        - discovery key; hub finds the resource by role not by name (rename-safe). Must
#                    match the JUPYTERHUB_LABEL_*_ROLE_* env. One resource per role or the hub won't start.
#                      volumes  : shared, docker-proxy (+ per-user lab-home/lab-workspace/lab-cache at spawn)
#                      networks : lab (hub<->lab), gpuinfo (hub<->sidecar)
#                      container: gpuinfo (the sidecar the hub self-starts)
#     .description - human phrase, informational only. Volumes: shown in the portal (e.g. the group
#                    "standard shared volume" row). Networks/containers: visible in `docker inspect`.
# --------------------------------------------------------------------------------------------------

services:

  # Traefik: routes traffic, TLS, one instance (443 only - secure ingress). HTTP :80 + insecure :8080 dashboard removed.
  # Dashboard now on 443 at /traefik/dashboard/ (api.basePath), open/close via TRAEFIK_DASHBOARD_ENABLED (see banner).
  traefik:
    image: traefik:latest
    # Dashboard at /traefik on 443, open by default. Close: TRAEFIK_DASHBOARD_ENABLED=false in .env
    # (NOT a container env - labels interpolate ${...} at parse time). Toggle gates the ROUTER below
    # (traefik.enable); no route -> api@internal unreachable -> UI+API 404. --api.dashboard=false
    # would hide only the UI, leaving /traefik/api open.
    command:
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # NAMESPACE isolation: only read labels from THIS deployment's project. 
      - "--providers.docker.constraints=Label(`com.docker.compose.project`,`${COMPOSE_PROJECT_NAME:-duoptimum-hub}`)"
      - "--providers.file.directory=/certs" # load any *.yml here
      - "--providers.file.watch=true" # hot-reload on cert regen
      - "--serverstransport.insecureskipverify=true" # https passthrough
      - "--api.dashboard=true" # enable dashboard+API; exposure is gated by the router toggle below
      - "--api.basePath=/traefik" # serve dashboard+API under /traefik (no stripprefix, no white page)
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # docker socket for service labels
      - hub_certs:/certs # certs (hub-provisioned)
    depends_on:
      hub:
        condition: service_healthy
    networks:
      - hub_network
    labels:
      # Dashboard router: /traefik -> built-in api@internal (UI at /traefik/dashboard/, API at /traefik/api/).
      # THE TOGGLE: traefik.enable gates this whole route. =false (set in .env) means the docker provider
      # never creates it, so api@internal is unreachable and /traefik 404s - UI and API both gone. Open by default.
      - "traefik.enable=${TRAEFIK_DASHBOARD_ENABLED:-true}"
      - "traefik.http.routers.traefik-dashboard.rule=PathPrefix(`/traefik`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls=true"
    restart: unless-stopped

  # Hub: manages users + their jupyterlab envs; proxies each user to their own env.
  hub:
    build:
      context: .
      dockerfile: services/jupyterhub/Dockerfile.jupyterhub
      args:
        - VERSION=${VERSION:-dev}
    image: stellars/duoptimum-hub:latest
    pull_policy: build
    volumes:
      - hub_certs:/certs # runtime cert dir Traefik watches
      - ./certs:/user-certs:ro # operator cert overlay (missing/empty -> auto-generate)
      - ./config:/mnt/user_config:ro # operator config overlay (missing/empty -> built-in)
      - hub_data:/data # database + cookie secrets
      - hub_shared:/mnt/shared # shared volume across envs
      - hub_docker:/var/run/docker-proxy-sockets # per-user listener sockets; spawner mounts per-user
      - /var/run/docker.sock:/var/run/docker.sock:rw # docker socket for spawner
    environment:
      # === TEMPLATE PLACEHOLDERS ===
      # {x} = hub resolves at runtime, never hardcode (NOT shell ${...}):
      #   {hostname} - addr hub discovers for a container it manages (e.g. gpuinfo sidecar IP)
      #   {compose}  - hub compose project, discovered at boot from own label
      #   {username} - lab owner, per-spawn
      #   {network}  - net per-context (role=lab for lab var, role=gpuinfo for sidecar var)

      # === HUB: core ===
      - JUPYTERHUB_ADMIN=admin # admin username
      - JUPYTERHUB_BASE_URL=/hub # URL prefix
      - JUPYTERHUB_SIGNUP_ENABLED=1 # self-register: 0=off, 1=on
      - JUPYTERHUB_SSL_ENABLED=0 # direct SSL: 0=off (use Traefik), 1=on
      - JUPYTERHUB_DOCKER_TIMEOUT=360 # Docker API timeout (s)
      - JUPYTERHUB_TIMEZONE= # IANA tz (e.g. Europe/Warsaw), empty=UTC
      - JUPYTERHUB_USER_CONFIG_FILE=jupyterhub_config.py # root config under /mnt/user_config, siblings copied as helpers
      - JUPYTERHUB_USER_VOLUMES_DESCRIPTIONS_FILE= # volume-desc overlay YAML, merges over volumes_dictionary.yml, mount via compose_override.yml
      - CERTIFICATE_DOMAIN_NAME=localhost # self-signed cert domain

      # === HUB: auth ===
      - JUPYTERHUB_AUTOGENERATED_PASSWORD_WORDS=4 # words in auto-gen pw
      - JUPYTERHUB_AUTOGENERATED_PASSWORD_DELIMITER=- # auto-gen pw delimiter
      - JUPYTERHUB_ADMIN_PASSWORD= # optional INITIAL admin pw, seeds on boot; ignored after admin changes it; off Settings page
      - JUPYTERHUB_LOGIN_MAX_FAILED_ATTEMPTS=5 # failed logins before lockout (0=off)
      - JUPYTERHUB_LOGIN_LOCKOUT_SECONDS=600 # lockout window after fails

      # === HUB: branding ===
      - JUPYTERHUB_BRANDING_HUB_NAME=DuOptimum Hub # hub display name: brand-icon tooltip + login/signup text
      - JUPYTERHUB_BRANDING_STAGE= # stage badge: DEV/STG/TST/PRD or text, empty=none
      - JUPYTERHUB_BRANDING_LOGO_URI= # logo URI (file:// or http(s)://)
      - JUPYTERHUB_BRANDING_FAVICON_URI= # favicon URI (file:// or http(s)://)

      # === HUB: idle culler (off by default) ===
      - JUPYTERHUB_IDLE_CULLER_ENABLED=0 # 0=off, 1=on
      - JUPYTERHUB_IDLE_CULLER_TIMEOUT_MINUTES=1440 # idle min before cull (24h)
      - JUPYTERHUB_IDLE_CULLER_INTERVAL=600 # check interval (s)
      - JUPYTERHUB_IDLE_CULLER_MAX_AGE=0 # max server age (s), 0=unlimited
      - JUPYTERHUB_IDLE_CULLER_MAX_EXTENSION_MINUTES=1440 # max extension/session (24h, UI whole hours)

      # === HUB: abuse protection (Layer A Traefik rateLimit + Layer B hub limits) ===
      - JUPYTERHUB_RATELIMIT_AVERAGE=${JUPYTERHUB_RATELIMIT_AVERAGE:-100} # req/period/source IP (0=off)
      - JUPYTERHUB_RATELIMIT_BURST=${JUPYTERHUB_RATELIMIT_BURST:-200} # burst above average
      - JUPYTERHUB_RATELIMIT_PERIOD=${JUPYTERHUB_RATELIMIT_PERIOD:-1s} # measurement period
      - JUPYTERHUB_RATELIMIT_XFF_DEPTH=${JUPYTERHUB_RATELIMIT_XFF_DEPTH:-1} # X-Forwarded-For depth (1=one proxy, 0=direct)
      - JUPYTERHUB_CONCURRENT_SPAWN_LIMIT=100 # max simultaneous spawns (spawn-storm guard)
      - JUPYTERHUB_ACTIVE_SERVER_LIMIT=0 # max running servers (0=unlimited)

      # === HUB: docker proxy (limited-docker groups) ===
      - JUPYTERHUB_DOCKER_PROXY_USER_COMPOSE_PROJECT_TEMPLATE={username}_containers # per-user compose label when docker-limited group enforces it ({compose},{username}), overrides Dockerfile default
      - JUPYTERHUB_DOCKER_PROXY_SOCKET_DIR=/var/run/docker-proxy-sockets # in-hub path for per-user sockets, backed by hub_docker volume, not host bind

      # === HUB: labels (discovery contract) ===
      # The hub's hub.* label family: it finds its networks/volumes/managed containers by
      # these keys+values, not by name (rename-safe). Naming JUPYTERHUB_LABEL_<DIMENSION>_<ASPECT>[_<ROLE>]
      # - KEY = the label key, a trailing role word = a role VALUE, DESCRIPTION = the human-phrase key.
      # All label envs live HERE in one place; MUST match the labels stamped on the networks/volumes/
      # sidecar below. Baked as Dockerfile ENV defaults; values here are identical (no behaviour change).
      # Value spelling is the literal label, NOT the env-name spelling (DOCKER_PROXY env -> "docker-proxy").
      - JUPYTERHUB_LABEL_NETWORK_ROLE_KEY=hub.network.role # label key on hub networks
      - JUPYTERHUB_LABEL_NETWORK_ROLE_LAB=lab # hub<->lab network role value
      - JUPYTERHUB_LABEL_NETWORK_ROLE_GPUINFO=gpuinfo # hub<->sidecar network role value
      - JUPYTERHUB_LABEL_CONTAINER_ROLE_KEY=hub.container.role # label key on hub-managed containers
      - JUPYTERHUB_LABEL_CONTAINER_ROLE_GPUINFO=gpuinfo # gpuinfo sidecar container role value
      - JUPYTERHUB_LABEL_CONTAINER_DESCRIPTION=hub.container.description # label key for the gpuinfo sidecar's human description
      - JUPYTERHUB_LABEL_VOLUME_ROLE_KEY=hub.volume.role # label key on hub volumes
      - JUPYTERHUB_LABEL_VOLUME_ROLE_SHARED=shared # shared volume role value
      - JUPYTERHUB_LABEL_VOLUME_ROLE_DOCKER_PROXY=docker-proxy # docker-proxy sockets volume role value (value keeps the hyphen)
      - JUPYTERHUB_LABEL_VOLUME_DESCRIPTION=hub.volume.description # label key the hub reads a volume's human description from (Lab Setup panel)
      - JUPYTERHUB_LABEL_VOLUME_OWNER_KEY=hub.volume.owner # label key on per-user volumes; value = the username
      # docker-proxy ownership labels - stamped on every proxy-created container/volume/network:
      - JUPYTERHUB_LABEL_DOCKER_PROXY_OWNER_KEY=hub.docker.proxy.owner # owner label key; all proxy ownership filtering keys off this (owner presence alone = proxy-managed)
      - JUPYTERHUB_LABEL_DOCKER_PROXY_OWNER_VALUE={username} # owner label value template; {username} substituted with the resource owner

      # === LAB: image + naming ===
      - JUPYTERHUB_LAB_IMAGE=stellars/stellars-jupyterlab-ds:latest # user container image
      - JUPYTERHUB_LAB_CONTAINER_NAME_TEMPLATE=jupyterlab-{username} # lab name template ({username}), spawner + hub lookups share var, no hardcoded prefix
      - JUPYTERHUB_LAB_COMPOSE_PROJECT_NAME={compose}_labs # compose label for labs ({compose}=discovered hub project), empty=same as hub
      # JUPYTERHUB_NETWORK_NAME baked {network} (Dockerfile) -> role=lab net (hub_network label below).
      # WARNING: change only if you know what you're doing - literal bypasses role discovery, must name existing hub net or labs won't spawn.

      # === LAB: GPU ===
      - JUPYTERHUB_GPU_ENABLED=1 # 0=off, 1=autodetect (GPU on only when detected)
      # sidecar IMAGE + CONTAINER NAME baked as image defaults (Dockerfile) + on gpuinfo-nvidia service below, not duplicated; override via compose_override.yml
      - JUPYTERHUB_GPUINFO_NVIDIA_URL=http://{hostname}:8000 # sidecar base URL TEMPLATE, {hostname} filled at boot with discovered sidecar addr
      # JUPYTERHUB_GPUINFO_NETWORK_NAME baked {network} (Dockerfile) -> role=gpuinfo net (hub_gpuinfo_network label below).
      # WARNING: change only if you know what you're doing - literal bypasses role discovery.

      # === LAB: services ===
      - JUPYTERHUB_LAB_SERVICE_MLFLOW=1 # MLflow tracking
      - JUPYTERHUB_LAB_SERVICE_RESOURCES_MONITOR=1 # resources monitor
      - JUPYTERHUB_LAB_SERVICE_TENSORBOARD=1 # TensorBoard

      # === LAB: resource warning thresholds ===
      - JUPYTERHUB_LAB_CONTAINER_MAX_EXTRA_SPACE_GB=10 # max writable layer (GB) before warning
      - JUPYTERHUB_LAB_VOLUME_MAX_TOTAL_SIZE_GB=50 # max total volume (GB) before warning
      - JUPYTERHUB_LAB_MEMORY_MAX_USAGE_FRACTION=0.25 # per-user mem warning, fraction of host RAM

      # === LAB: member defaults (configuring group overrides each) ===
      - JUPYTERHUB_LAB_SUDO_ENABLE=1 # default only - member sudo (0/1) -> JUPYTERLAB_SUDO_ENABLE
      - JUPYTERHUB_LAB_BLOCK_FILE_DOWNLOADS=0 # default only - downloads (0=allow, 1=block)

      # === LAB: branding / icons ===
      - JUPYTERHUB_BRANDING_LAB_NAME=Duoptimum Hub # lab display name (injected into labs as JUPYTERLAB_SYSTEM_NAME: header/welcome/MOTD), empty=none
      - JUPYTERHUB_BRANDING_FAVICON_BUSY_URI= # kernel-busy favicon (file:// or URL), empty=JupyterLab default
      - JUPYTERHUB_BRANDING_LAB_MAIN_ICON_URI= # JupyterLab main icon (file:// or URL)
      - JUPYTERHUB_BRANDING_LAB_SPLASH_ICON_URI= # JupyterLab splash icon (file:// or URL)

      # === LAB: admin aux (shared volume) ===
      - JUPYTERLAB_AUX_SCRIPTS_PATH=/mnt/shared/start-platform.d # admin startup scripts for envs
      - JUPYTERLAB_AUX_MENU_PATH=/mnt/shared/lab-utils.d # admin custom menu defs
    labels:
      # Enable Traefik proxy
      - "traefik.enable=true"

      # hub on 2 nets (hub_network + hub_gpuinfo_network); traefik only on hub_network.
      # pin backend net - else traefik may pick the unreachable gpuinfo IP -> 504 gateway timeout.
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-duoptimum-hub}_hub_network"

      # hub service (8000), canonical /hub; /jupyterhub + /duoptimum-hub aliases
      # -> redirected by hub-alias-redirect below
      - "traefik.http.routers.hub-rtr.rule=Path(`/hub`)
         || PathPrefix(`/hub/`)
         || Path(`/jupyterhub`)
         || PathPrefix(`/jupyterhub/`)
         || Path(`/duoptimum-hub`)
         || PathPrefix(`/duoptimum-hub/`)"
      - "traefik.http.routers.hub-rtr.entrypoints=websecure"
      - "traefik.http.routers.hub-rtr.service=hub-svc"
      - "traefik.http.routers.hub-rtr.tls=true"
      - "traefik.http.services.hub-svc.loadbalancer.server.scheme=http"
      - "traefik.http.services.hub-svc.loadbalancer.server.port=8000"

      # Aliases - /jupyterhub, /duoptimum-hub 302 to canonical base_url (/hub). Subpath kept.
      - "traefik.http.middlewares.hub-alias-redirect.redirectregex.regex\
        =^(https?://[^/]+)/(jupyterhub|duoptimum-hub)(/.*)?$$"
      - "traefik.http.middlewares.hub-alias-redirect.redirectregex.replacement=$${1}/hub$${3}"
      - "traefik.http.middlewares.hub-alias-redirect.redirectregex.permanent=false"

      # Abuse protection - per-IP rate limit for hub + all labs (all ingress via CHP :8000).
      # WebSocket-safe: upgrade counts once at open; held connections not re-counted.
      - "traefik.http.middlewares.hub-ratelimit.ratelimit.average=${JUPYTERHUB_RATELIMIT_AVERAGE:-100}"
      - "traefik.http.middlewares.hub-ratelimit.ratelimit.burst=${JUPYTERHUB_RATELIMIT_BURST:-200}"
      - "traefik.http.middlewares.hub-ratelimit.ratelimit.period=${JUPYTERHUB_RATELIMIT_PERIOD:-1s}"
      - "traefik.http.middlewares.hub-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth\
        =${JUPYTERHUB_RATELIMIT_XFF_DEPTH:-1}"
      - "traefik.http.routers.hub-rtr.middlewares=hub-alias-redirect,hub-ratelimit"
    networks:
      - hub_network
      - hub_gpuinfo_network # hub<->sidecar; hub attaches, sidecar joins too
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f jupyterhub > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # GPU-info sidecar (NVIDIA). DECLARED here so image + build + wiring are explicit, but gated
  # behind the `gpuinfo` profile so `docker compose up` does NOT start it: the HUB owns its
  # lifecycle over the docker socket (ensure_gpuinfo_sidecar) - starts only when GPU enabled,
  # removes on shutdown, applies the nvidia runtime conditionally (portable to non-GPU hosts).
  # build+image -> `docker compose build` makes the image locally (hub never pulls at boot).
  # Manual `docker compose --profile gpuinfo up` works on a GPU host for debugging.
  gpuinfo-nvidia:
    build:
      context: .
      dockerfile: services/jupyterhub/gpuinfo-nvidia/Dockerfile
      target: target
    image: stellars/duoptimum-gpuinfo-nvidia:latest
    pull_policy: build
    profiles:
      - gpuinfo # not in any default profile -> never auto-started; hub-managed
    labels:
      hub.container.role: "gpuinfo" # MUST match JUPYTERHUB_LABEL_CONTAINER_ROLE_GPUINFO 
    # runtime env (NVIDIA_*, GPUINFO_PORT), port + cmd baked in the image - not redeclared here
    runtime: nvidia # GPU access via nvidia runtime (host must register it)
    networks:
      - hub_gpuinfo_network
    restart: unless-stopped

  ## Watchtower - daily image refresh (monitor-only); single instance via port
  watchtower:
    image: nickfedor/watchtower:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=false" # exclude from self-updates
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw # control docker, refresh images
    command: --cleanup --monitor-only --schedule "0 0 0 * * *" # daily midnight UTC (6-field cron), pull only (no restart)
    security_opt:
      - seccomp:unconfined #optional
    depends_on:
      hub:
        condition: service_healthy
      traefik:
        condition: service_started
    networks:
      - hub_network
    restart: unless-stopped
    privileged: true

volumes:
  # Role labels let the hub DISCOVER these by hub.volume.role (rename-safe), not by
  # name. Key + role values baked as hub env (Dockerfile); literals here MUST match. One
  # volume per role - duplicate role makes the hub fail to start. The .description label is a
  # human phrase the portal shows beside the volume (e.g. the group "standard shared volume" row).
  hub_data:   # hub users, config, activity
    labels:
      hub.volume.description: "Hub database, config and activity history"
  hub_certs:  # platform certs (autogenerated or provisioned)
    labels:
      hub.volume.description: "Platform TLS certificates"
  hub_shared: # shared volume for users (can map to s3/cifs)
    labels:
      hub.volume.role: "shared"
      hub.volume.description: "Platform-wide shared storage for all users"
  hub_docker: # in-process docker-proxy per-user sockets; subpath-mounted per lab
    labels:
      hub.volume.role: "docker-proxy"
      hub.volume.description: "Per-user docker-proxy sockets"

networks:
  # hub_network = hub<->lab net spawned labs join. Role label lets hub DISCOVER its real name
  # at boot (resolve_self_network_by_label, scoped to hub's own attachments) - no name to drift.
  # The .description label is a human phrase shown in `docker inspect` (informational only).
  hub_network:
    labels:
      hub.network.role: "lab" # MUST match JUPYTERHUB_LABEL_NETWORK_ROLE_*
      hub.network.description: "Hub to user-lab network (spawned labs join here)"

  # hub<->GPU-info sidecar net. Compose OWNS/creates it (driver + attachments managed here);
  # role label lets hub DISCOVER its real name at boot. Hub joins it + runs the sidecar on it;
  # labs are on hub_network only, so they cannot reach it.
  hub_gpuinfo_network:
    labels:
      hub.network.role: "gpuinfo" # MUST match JUPYTERHUB_LABEL_NETWORK_ROLE_*
      hub.network.description: "Hub to GPU-info sidecar network (labs cannot reach it)"

# EOF
