# Overlay: GPU autodetect backed by a MOCK gpuinfo sidecar, so the GPU display tests
# run on ANY host (no real GPU/driver needed). The hub self-starts this image as its
# sidecar (self-start requests the nvidia runtime only when present, so the mock starts
# on CPU hosts too). `tests/functional/run.sh gpu` builds the mock image and passes
# FUNCTEST_GPU_ENABLED=1 (which the base compose feeds to both the hub and the test
# marker gate). Layer ON TOP of compose.functional.yml.
#
# The base stack ALREADY multi-homes the hub onto gpuinfo_network (role=gpuinfo) to
# reproduce prod, so this overlay declares NO network of its own: the hub discovers
# that base net by role (resolve_self_network_by_label, hub.network.role=gpuinfo) and
# self-starts the mock sidecar on it. Declaring a 2nd role=gpuinfo net here would make
# that lookup ambiguous (ValueError) - the base net is the single source.

services:
  duoptimum-hub:
    environment:
      # the hub self-starts THIS image as the gpuinfo sidecar; it serves canned GPUs
      - JUPYTERHUB_GPUINFO_NVIDIA_IMAGE=stellars/duoptimum-gpuinfo-mock:latest
