# Override for auth mode 2: signup-disabled + env-password admin.
#
# The base compose already disables signup; this adds JUPYTERHUB_ADMIN_PASSWORD so
# the admin is provisioned from the env (bootstrap-by-env), not the signup window.
# On a fresh DB this needs a restart-to-provision (the users_info table is created
# after the config runs on the first boot, so the first provision is a no-op and
# the second boot seeds the admin) - driven by `tests/functional/run.sh env`.
services:
  duoptimum-hub:
    environment:
      - JUPYTERHUB_ADMIN_PASSWORD=functest-secret
      - JUPYTERHUB_BRANDING_STAGE=TST   # exercise the environment-stage header badge (TST -> blue)
  tests:
    environment:
      - FUNCTEST_AUTH_MODE=env
