[pytest]
# The summary line ("N passed in Xs") is the total test execution time.
addopts = -ra
markers =
    gpu: GPU auto-detection test - collected only when GPU auto-detect is on (deselected on CPU hosts)
    envauth: env-password admin auth test - collected only in env mode (make test-functional-env)
    signupopen: open-signup regime test - collected only in signup-open mode (make test-functional-signup-open)
    acc_crit: declares the acceptance criteria a test covers ("<doc-slug>::<label>", ...); mandatory on every functional test (see conftest coverage report)
# pytest-playwright provides the page/browser fixtures (Chromium by default).
