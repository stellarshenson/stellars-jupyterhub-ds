<!DOCTYPE html>
<html lang="en" data-theme="optimum-hub-dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Optimum Hub - Lab Container</title>
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/app.css">
  <link rel="icon" href="assets/brand/favicon.ico">
  <script>try{var m=localStorage.getItem("optimum-hub-theme");var d=window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches;var t=(m==="optimum-hub-dark"||m==="dark")?"optimum-hub-dark":(m==="optimum-hub-light"||m==="light")?"optimum-hub-light":(d?"optimum-hub-dark":"optimum-hub-light");document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
</head>
<!-- Lab Container is the one place that defines the spawned lab: the image and
     the custom volume set. UI over the platform's file-only config
     (JUPYTERHUB_LAB_IMAGE, DOCKER_SPAWNER_VOLUMES, VOLUME_DESCRIPTIONS). The
     three core volumes (home/workspace/cache) are platform-managed and not
     listed; admins add custom shared mounts. The names, mount points and
     descriptions shown on the user Volumes tab come from here. -->
<body data-page="lab-container" data-title="Lab Container">
<main>
  <div class="page-head">
    <div class="titles">
      <h1 class="page-title">Lab Container</h1>
      <div class="page-sub">The image and volumes every user's lab is spawned with</div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label>Lab image</label>
      <input class="input mono" type="text" value="stellars/stellars-jupyterlab-ds:latest" title="The Docker image DockerSpawner launches for each user">
    </div>

    <div class="section-title">Custom volumes</div>
    <div class="note" style="margin-bottom:var(--space-3)"><span><b>Note:</b> every lab also gets the three standard volumes - home, workspace and cache. They are platform-managed and not listed here. Add custom shared mounts below.</span></div>
    <div class="table-wrap">
      <table class="tbl">
        <thead><tr><th>Name</th><th>Mount point</th><th>Description</th><th class="right"></th></tr></thead>
        <tbody>
          <tr>
            <td><input class="input mono" value="jupyterhub_shared"></td>
            <td><input class="input mono" value="/mnt/shared"></td>
            <td><input class="input" value="Shared team storage (CIFS/NAS)"></td>
            <td class="right"><button class="list-icon-dangerous" title="Remove volume" data-toast="Removed jupyterhub_shared (mock)">{ic:close}</button></td>
          </tr>
          <tr>
            <td><input class="input mono" value="jupyterhub_datasets"></td>
            <td><input class="input mono" value="/mnt/datasets"></td>
            <td><input class="input" value="Read-only reference datasets"></td>
            <td class="right"><button class="list-icon-dangerous" title="Remove volume" data-toast="Removed jupyterhub_datasets (mock)">{ic:close}</button></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div style="margin-top:var(--space-3)"><button class="list-secondary" data-toast="Add a custom volume (mock)">{ic:plus} Add volume</button></div>

    <div class="form-foot" style="justify-content:flex-end">
      <a class="page-secondary" href="home.html">Cancel</a>
      <button class="page-primary" data-toast="Saved lab container config (mock)">Save</button>
    </div>
  </div>
</main>
<script src="assets/app.js"></script>
</body>
</html>
