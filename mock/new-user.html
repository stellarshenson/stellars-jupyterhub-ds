<!DOCTYPE html>
<html lang="en" data-theme="optimum-hub-dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Optimum Hub - New user</title>
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/app.css">
  <link rel="icon" href="assets/brand/favicon.ico">
  <script>try{var t=localStorage.getItem("optimum-hub-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
</head>
<body data-page="users" data-title="New user">
<main>
  <div class="page-head">
    <div class="titles">
      <h1 class="page-title">New user</h1>
      <div class="page-sub">Create a single user</div>
    </div>
    <div class="actions">
      <a class="btn btn-ghost" href="users.html">{ic:chevron} Users</a>
    </div>
  </div>

  <div class="card" style="max-width:620px">
    <div class="field">
      <label>Username</label>
      <input class="input" type="text" placeholder="e.g. tomasz">
    </div>

    <!-- One password field: pre-filled with a generated value, overwrite to set
         your own. No mode toggle - whatever is in the field on Save is used. -->
    <div class="field">
      <label>Password</label>
      <div style="display:flex;gap:var(--space-2);align-items:center">
        <input class="input mono" type="text" value="correct-horse-battery">
        <button class="btn btn-sm" data-toast="Regenerated password (mock)">Regenerate</button>
      </div>
      <div class="page-sub" style="margin-top:var(--space-2)">Auto-generated - type over it to set your own; shown to you after the user is created</div>
    </div>

    <!-- Groups: typeahead combobox scales to hundreds of groups -->
    <div class="field">
      <label>Groups</label>
      <div class="combo" data-combo="groups" style="max-width:420px">
        <div class="chips" data-combo-chips>
          <span class="chip" data-val="data-science"><span>data-science</span><span class="x">{ic:stop}</span></span>
        </div>
        <input class="combo-input" type="text" placeholder="Add to group…">
        <div class="combo-pop" data-combo-pop></div>
      </div>
    </div>

    <div class="field" style="margin-bottom:0">
      <label>Authorize now</label>
      <div style="display:flex;align-items:center;gap:var(--space-3)">
        <span class="switch on" data-toast="Toggled authorize-now (mock)"><span class="track"></span></span>
        <span class="page-sub">on = usable immediately; off defers authorisation to later</span>
      </div>
    </div>

    <div style="display:flex;gap:var(--space-2);justify-content:flex-end;margin-top:var(--space-5)">
      <a class="btn" href="users.html">Cancel</a>
      <button class="btn btn-primary" data-toast="Created user (mock)">Add user</button>
    </div>
  </div>
</main>
<script src="assets/app.js"></script>
</body>
</html>
