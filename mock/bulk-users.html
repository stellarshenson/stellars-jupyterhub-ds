<!DOCTYPE html>
<html lang="en" data-theme="optimum-hub-dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Optimum Hub - Bulk add</title>
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/app.css">
  <link rel="icon" href="assets/brand/favicon.ico">
  <script>try{var m=localStorage.getItem("optimum-hub-theme");var d=window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches;var t=(m==="optimum-hub-dark"||m==="dark")?"optimum-hub-dark":(m==="optimum-hub-light"||m==="light")?"optimum-hub-light":(d?"optimum-hub-dark":"optimum-hub-light");document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
</head>
<body data-page="users" data-title="Bulk add" data-crumb-parent="Users|users.html">
<main>
  <div class="page-head">
    <div class="titles">
      <h1 class="page-title">Bulk add users</h1>
      <div class="page-sub">Configure once for the batch - paste one username per line</div>
    </div>
  </div>

  <div class="card" style="max-width:620px">
    <div class="field">
      <label>Usernames</label>
      <textarea class="input" rows="8" placeholder="one username per line&#10;tomasz&#10;ewa&#10;piotr&#10;kasia"></textarea>
    </div>

    <div class="field">
      <label>Groups</label>
      <div class="combo" data-combo="groups" style="max-width:420px">
        <div class="chips" data-combo-chips>
          <span class="chip" data-val="interns"><span>interns</span><span class="x">{ic:close}</span></span>
        </div>
        <input class="combo-input" type="text" placeholder="Add to group…">
        <div class="combo-pop" data-combo-pop></div>
      </div>
    </div>

    <div class="field">
      <label>Authorize now</label>
      <div style="display:flex;align-items:center;gap:var(--space-3)">
        <span class="switch on" title="off = authorise later" data-toast="Toggle authorize now (mock)"><span class="track"></span></span>
      </div>
    </div>

    <div class="field">
      <label>Require password change on first login</label>
      <div style="display:flex;align-items:center;gap:var(--space-3)">
        <span class="switch on" title="Users set their own password on first sign-in" data-toast="Toggle force password change (mock)"><span class="track"></span></span>
      </div>
    </div>

    <!-- No password fields: every password is auto-generated (an operator
         cannot set 100 passwords by hand). Secrets surface once on the result. -->
    <div class="note" style="margin-bottom:var(--space-4)"><span><b>Note:</b> no password fields - every password is auto-generated and shown once on the next screen.</span></div>

    <div style="display:flex;gap:var(--space-2);justify-content:flex-end">
      <a class="page-secondary" href="users.html">Cancel</a>
      <a class="page-primary" href="bulk-result.html">Create users</a>
    </div>
  </div>
</main>
<script src="assets/app.js"></script>
</body>
</html>
