<!DOCTYPE html>
<html lang="en" data-theme="optimum-hub-dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Optimum Hub - New group</title>
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/app.css">
  <link rel="icon" href="assets/brand/favicon.ico">
  <script>try{var t=localStorage.getItem("optimum-hub-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
</head>
<body data-page="groups" data-title="New group">
<main>
  <div class="page-head">
    <div class="titles">
      <h1 class="page-title">New group</h1>
      <div class="page-sub"><a href="groups.html" style="color:var(--color-accent);cursor:pointer">{ic:arrowup} Back to Groups</a></div>
    </div>
  </div>

  <!-- Group creation is a dedicated screen, not an inline add-row. Name +
       optional description only; the nine policy sections are set afterwards in
       group config, once the group exists. -->
  <div class="card" style="max-width:560px">
    <div class="field">
      <label>Name</label>
      <input class="input" type="text" placeholder="research">
      <div class="page-sub" style="margin-top:var(--space-2)">starts with a letter, [a-zA-Z0-9_-]</div>
    </div>
    <div class="field">
      <label>Description</label>
      <input class="input" type="text" placeholder="What this group is for (optional)">
    </div>
    <div style="display:flex;gap:var(--space-2);justify-content:flex-end">
      <a class="btn" href="groups.html">Cancel</a>
      <button class="btn btn-primary" data-toast="Created group (mock)">Create group</button>
    </div>
  </div>
</main>
<script src="assets/app.js"></script>
</body>
</html>
