<!--
  32-decay-waterfall.svg - Exponential decay visualized as waterfall
  Left: cascading water levels dropping over time. Right: scoring explanation card.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
    }
  </style>

  <!-- LEFT: Exponential decay curve as waterfall -->
  <g id="waterfall">
    <!-- Axes -->
    <line x1="50" y1="20" x2="50" y2="170" stroke="#0096d1" stroke-width="0.4" opacity="0.15"/>
    <line x1="50" y1="170" x2="340" y2="170" stroke="#0096d1" stroke-width="0.4" opacity="0.15"/>

    <!-- Decay curve -->
    <path d="M50,30 C70,30 80,35 100,48 C130,70 160,95 200,120 C240,142 280,155 340,162"
          fill="none" stroke="#0096d1" stroke-width="2" opacity="0.35" stroke-linecap="round"/>

    <!-- Water fill under curve -->
    <path d="M50,30 C70,30 80,35 100,48 C130,70 160,95 200,120 C240,142 280,155 340,162 L340,170 L50,170 Z"
          fill="#0096d1" fill-opacity="0.06"/>

    <!-- Cascade steps (waterfall terraces) -->
    <line x1="50" y1="30" x2="90" y2="30" stroke="#0096d1" stroke-width="0.5" opacity="0.15"/>
    <line x1="90" y1="30" x2="90" y2="55" stroke="#0096d1" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,2"/>
    <line x1="90" y1="55" x2="140" y2="55" stroke="#0096d1" stroke-width="0.5" opacity="0.12"/>
    <line x1="140" y1="55" x2="140" y2="88" stroke="#0096d1" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,2"/>
    <line x1="140" y1="88" x2="200" y2="88" stroke="#0096d1" stroke-width="0.5" opacity="0.1"/>
    <line x1="200" y1="88" x2="200" y2="120" stroke="#0096d1" stroke-width="0.3" opacity="0.08" stroke-dasharray="2,2"/>
    <line x1="200" y1="120" x2="270" y2="120" stroke="#0096d1" stroke-width="0.5" opacity="0.08"/>
    <line x1="270" y1="120" x2="270" y2="148" stroke="#0096d1" stroke-width="0.3" opacity="0.06" stroke-dasharray="2,2"/>

    <!-- Spray particles at each step -->
    <circle cx="92" cy="42" r="1" fill="#0096d1" opacity="0.15"/>
    <circle cx="88" cy="38" r="0.8" fill="#0096d1" opacity="0.1"/>
    <circle cx="142" cy="72" r="1" fill="#0096d1" opacity="0.12"/>
    <circle cx="138" cy="68" r="0.8" fill="#0096d1" opacity="0.08"/>
    <circle cx="202" cy="105" r="0.8" fill="#0096d1" opacity="0.1"/>
    <circle cx="272" cy="135" r="0.7" fill="#0096d1" opacity="0.06"/>

    <!-- Half-life marker -->
    <line x1="140" y1="85" x2="140" y2="175" stroke="#da8230" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,3"/>
    <text x="140" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle" fill="#da8230" opacity="0.5">72h</text>

    <!-- Axis labels -->
    <text x="45" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="end" class="fg-4">100%</text>
    <text x="45" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="end" class="fg-4">50%</text>
    <text x="45" y="145" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="end" class="fg-4">25%</text>
    <text x="195" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle" class="fg-4">time</text>

    <text x="195" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" text-anchor="middle" class="fg-2">weight = e ^ (-lambda * hours)</text>
  </g>

  <!-- RIGHT: Scoring card -->
  <g id="scoring-card">
    <path d="M380,12 H780 V186 Q780,190 776,190 H384 Q380,190 380,186 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M380,12 H780 V186 Q780,190 776,190 H384 Q380,190 380,186 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="380" y="12" width="400" height="5" fill="#0096d1" opacity="0.6"/>

    <text x="394" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1" fill="#0096d1">ACTIVITY SCORING</text>
    <text x="394" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1">Exponential Decay</text>

    <text x="394" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">Recent activity weighs more than older activity</text>

    <!-- Example weights -->
    <text x="394" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">Now</text>
    <rect x="440" y="83" width="100" height="8" rx="2" fill="#1a8a4a" opacity="0.25"/>
    <text x="548" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">weight: 1.0</text>

    <text x="394" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">3 days ago</text>
    <rect x="470" y="99" width="50" height="8" rx="2" fill="#da8230" opacity="0.2"/>
    <text x="528" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">weight: 0.5</text>

    <text x="394" y="124" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">6 days ago</text>
    <rect x="470" y="115" width="25" height="8" rx="2" fill="#0096d1" opacity="0.12"/>
    <text x="503" y="124" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">weight: 0.25</text>

    <!-- 5-segment bar example -->
    <text x="394" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="fg-2">Display: 5-segment bar</text>
    <rect x="394" y="155" width="16" height="10" rx="1.5" fill="#1a8a4a" opacity="0.5"/>
    <rect x="413" y="155" width="16" height="10" rx="1.5" fill="#1a8a4a" opacity="0.5"/>
    <rect x="432" y="155" width="16" height="10" rx="1.5" fill="#1a8a4a" opacity="0.5"/>
    <rect x="451" y="155" width="16" height="10" rx="1.5" fill="#da8230" opacity="0.4"/>
    <rect x="470" y="155" width="16" height="10" rx="1.5" fill="none" stroke="#0096d1" stroke-width="0.5" opacity="0.2"/>
    <text x="500" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">= 72% engagement</text>

    <text x="394" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Separate SQLite database - no lock contention with JupyterHub</text>
  </g>
</svg>
