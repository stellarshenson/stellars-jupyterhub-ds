<!--
  29-password-dandelion.svg - Mnemonic password generation
  Left: dandelion seeds drifting (word fragments). Right: credentials card.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
    }
  </style>

  <!-- LEFT: Dandelion with drifting word-seeds -->
  <g id="dandelion">
    <!-- Stem -->
    <path d="M160,185 C158,160 162,140 160,110" stroke="#0096d1" stroke-width="1" opacity="0.2" fill="none"/>
    <!-- Head -->
    <circle cx="160" cy="100" r="10" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.6" opacity="0.3"/>

    <!-- Seeds drifting right - each is a word -->
    <g font-family="Segoe UI, Arial, sans-serif" font-size="9">
      <!-- Seed lines (tiny stalks) -->
      <line x1="168" y1="96" x2="210" y2="68" stroke="#da8230" stroke-width="0.3" opacity="0.15"/>
      <circle cx="212" cy="66" r="1.5" fill="#da8230" opacity="0.2"/>
      <text x="218" y="70" font-weight="600" class="fg-2">storm</text>

      <line x1="170" y1="100" x2="220" y2="95" stroke="#da8230" stroke-width="0.3" opacity="0.12"/>
      <circle cx="222" cy="94" r="1.5" fill="#da8230" opacity="0.18"/>
      <text x="228" y="98" font-weight="600" class="fg-2">apple</text>

      <line x1="168" y1="105" x2="205" y2="125" stroke="#da8230" stroke-width="0.3" opacity="0.15"/>
      <circle cx="207" cy="127" r="1.5" fill="#da8230" opacity="0.2"/>
      <text x="213" y="131" font-weight="600" class="fg-2">ocean</text>

      <line x1="165" y1="92" x2="195" y2="52" stroke="#da8230" stroke-width="0.3" opacity="0.1"/>
      <circle cx="197" cy="50" r="1.2" fill="#da8230" opacity="0.15"/>
      <text x="203" y="54" class="fg-4">river</text>

      <line x1="166" y1="108" x2="190" y2="150" stroke="#da8230" stroke-width="0.3" opacity="0.1"/>
      <circle cx="192" cy="152" r="1.2" fill="#da8230" opacity="0.12"/>
      <text x="198" y="156" class="fg-4">maple</text>

      <!-- Far drifters (fading) -->
      <line x1="155" y1="94" x2="120" y2="55" stroke="#0096d1" stroke-width="0.2" opacity="0.08"/>
      <circle cx="118" cy="53" r="1" fill="#0096d1" opacity="0.1"/>
      <text x="100" y="57" font-size="7" class="fg-4">cloud</text>

      <line x1="155" y1="106" x2="115" y2="140" stroke="#0096d1" stroke-width="0.2" opacity="0.08"/>
      <circle cx="113" cy="142" r="1" fill="#0096d1" opacity="0.1"/>
      <text x="95" y="146" font-size="7" class="fg-4">bridge</text>
    </g>

    <text x="160" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle" class="fg-4">xkcdpass wordlist</text>
  </g>

  <!-- Dashes connecting to card -->
  <text x="295" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="14" class="fg-3">-</text>
  <text x="310" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="14" class="fg-3">-</text>
  <text x="325" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="14" class="fg-3">-</text>

  <!-- RIGHT: Credentials card -->
  <g id="creds-card">
    <path d="M360,16 H780 V180 Q780,184 776,184 H364 Q360,184 360,180 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M360,16 H780 V180 Q780,184 776,184 H364 Q360,184 360,180 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="360" y="16" width="420" height="5" fill="#da8230" opacity="0.6"/>

    <text x="374" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1" fill="#da8230">ADMIN CREATES USER</text>

    <!-- User row mockup -->
    <rect x="374" y="50" width="392" height="28" rx="3" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.5"/>
    <text x="388" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4">Username</text>
    <text x="388" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="fg-1">new.scientist</text>
    <text x="560" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4">Password</text>
    <text x="560" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#da8230">storm-apple-ocean</text>

    <!-- Process -->
    <text x="374" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">1. Admin adds user via panel</text>
    <text x="374" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">2. SQLAlchemy after_insert generates xkcdpass password</text>
    <text x="374" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">3. bcrypt hash stored, plaintext cached 5 min</text>
    <text x="374" y="146" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">4. Credentials modal with copy + download</text>

    <text x="374" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Memorable words instead of random strings - users can type their first password</text>
  </g>
</svg>
