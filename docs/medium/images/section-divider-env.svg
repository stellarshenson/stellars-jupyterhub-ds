<!-- Abstract decorative divider: layered horizontal bands -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50">
  <defs>
    <linearGradient id="lb1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0096d1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0096d1" stop-opacity="0.12"/>
      <stop offset="80%" stop-color="#0096d1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0096d1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lb2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#da8230" stop-opacity="0"/>
      <stop offset="25%" stop-color="#da8230" stop-opacity="0.08"/>
      <stop offset="75%" stop-color="#da8230" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#da8230" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="80" y="10" width="640" height="2" rx="1" fill="url(#lb1)"/>
  <rect x="140" y="18" width="520" height="1.5" rx="0.75" fill="url(#lb2)"/>
  <rect x="60" y="25" width="680" height="2.5" rx="1.25" fill="url(#lb1)"/>
  <rect x="120" y="33" width="560" height="1.5" rx="0.75" fill="url(#lb2)"/>
  <rect x="90" y="40" width="620" height="2" rx="1" fill="url(#lb1)"/>
</svg>
