<!--
  39-ai-assistants-constellation.svg - AI assistants as a star constellation
  Left: stars forming a constellation pattern. Right: installer card.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
    }
  </style>

  <!-- LEFT: Constellation -->
  <g id="constellation">
    <!-- Connection lines (constellation edges) -->
    <line x1="100" y1="45" x2="180" y2="70" stroke="#da8230" stroke-width="0.5" opacity="0.12"/>
    <line x1="180" y1="70" x2="140" y2="120" stroke="#da8230" stroke-width="0.5" opacity="0.12"/>
    <line x1="140" y1="120" x2="220" y2="135" stroke="#da8230" stroke-width="0.5" opacity="0.1"/>
    <line x1="180" y1="70" x2="260" y2="55" stroke="#da8230" stroke-width="0.5" opacity="0.1"/>
    <line x1="260" y1="55" x2="220" y2="135" stroke="#da8230" stroke-width="0.4" opacity="0.08"/>

    <!-- Star: Claude Code (brightest) -->
    <circle cx="100" cy="45" r="8" fill="#da8230" fill-opacity="0.08" stroke="#da8230" stroke-width="0.6" opacity="0.4"/>
    <circle cx="100" cy="45" r="3" fill="#da8230" opacity="0.45"/>
    <text x="100" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" text-anchor="middle" class="fg-1">Claude Code</text>

    <!-- Star: Cursor -->
    <circle cx="180" cy="70" r="7" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.6" opacity="0.35"/>
    <circle cx="180" cy="70" r="2.5" fill="#0096d1" opacity="0.4"/>
    <text x="195" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="fg-2">Cursor</text>

    <!-- Star: Gemini CLI -->
    <circle cx="260" cy="55" r="6" fill="#da8230" fill-opacity="0.05" stroke="#da8230" stroke-width="0.5" opacity="0.3"/>
    <circle cx="260" cy="55" r="2" fill="#da8230" opacity="0.35"/>
    <text x="275" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Gemini CLI</text>

    <!-- Star: OpenAI Codex -->
    <circle cx="140" cy="120" r="5.5" fill="#0096d1" fill-opacity="0.04" stroke="#0096d1" stroke-width="0.5" opacity="0.25"/>
    <circle cx="140" cy="120" r="2" fill="#0096d1" opacity="0.3"/>
    <text x="140" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle" class="fg-4">Codex</text>

    <!-- Star: MCP Gateway (dimmest) -->
    <circle cx="220" cy="135" r="5" fill="#da8230" fill-opacity="0.03" stroke="#da8230" stroke-width="0.4" opacity="0.2"/>
    <circle cx="220" cy="135" r="1.5" fill="#da8230" opacity="0.25"/>
    <text x="220" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle" class="fg-4">MCP</text>

    <!-- Background dim stars -->
    <circle cx="60" cy="80" r="0.8" fill="#0096d1" opacity="0.08"/>
    <circle cx="290" cy="90" r="0.6" fill="#da8230" opacity="0.06"/>
    <circle cx="80" cy="140" r="0.7" fill="#0096d1" opacity="0.05"/>
    <circle cx="240" cy="30" r="0.5" fill="#da8230" opacity="0.06"/>
    <circle cx="310" cy="120" r="0.8" fill="#0096d1" opacity="0.04"/>
    <circle cx="50" cy="110" r="0.6" fill="#da8230" opacity="0.05"/>
  </g>

  <!-- Arrow -->
  <path d="M320,90 L394,90" fill="none" stroke="#da8230" stroke-width="0.6" opacity="0.2"/>
  <polygon points="394,87 400,90 394,93" fill="#da8230" opacity="0.3"/>

  <!-- RIGHT: Installer card -->
  <g id="ai-card">
    <path d="M408,10 H780 V168 Q780,172 776,172 H412 Q408,172 408,168 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M408,10 H780 V168 Q780,172 776,172 H412 Q408,172 408,168 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="408" y="10" width="372" height="5" fill="#da8230" opacity="0.6"/>

    <text x="422" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1" fill="#da8230">AI CODING ASSISTANTS</text>
    <text x="422" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1">One-command install via Lab Utilities</text>

    <rect x="422" y="60" width="342" height="18" rx="3" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="0.5"/>
    <text x="432" y="73" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="fg-2">Claude Code</text>
    <text x="560" y="73" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Anthropic CLI agent - terminal + MCP</text>

    <rect x="422" y="82" width="342" height="18" rx="3" fill="#0096d1" fill-opacity="0.03" stroke="#0096d1" stroke-width="0.4"/>
    <text x="432" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="fg-2">Cursor</text>
    <text x="560" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">AI-native IDE with codebase context</text>

    <rect x="422" y="104" width="342" height="18" rx="3" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.4"/>
    <text x="432" y="117" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-2">Gemini CLI</text>
    <text x="560" y="117" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Google AI in the terminal</text>

    <rect x="422" y="126" width="342" height="18" rx="3" fill="#0096d1" fill-opacity="0.03" stroke="#0096d1" stroke-width="0.4"/>
    <text x="432" y="139" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">OpenAI Codex</text>
    <text x="560" y="139" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">GPT-powered code generation</text>

    <text x="422" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">All install to user volume - persist across image refreshes</text>
  </g>
</svg>
