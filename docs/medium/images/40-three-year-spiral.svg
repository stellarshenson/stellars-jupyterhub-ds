<!--
  40-three-year-spiral.svg - Three years of development as a growing spiral
  Pure creative: a spiral expanding outward with milestone markers.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
    }
  </style>

  <!-- Spiral path (Archimedean, hand-approximated) -->
  <path d="M400,120
           C410,100 420,95 430,100
           C445,108 445,125 430,138
           C410,155 385,155 370,138
           C350,115 352,88 375,72
           C402,52 435,55 455,78
           C478,108 475,148 445,172
           C410,200 362,195 338,168
           C308,132 315,80 350,52
           C392,18 448,25 480,62
           C516,108 510,175 465,208"
        fill="none" stroke="#0096d1" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

  <!-- Outer continuation fading -->
  <path d="M465,208 C415,245 345,240 308,200 C268,155 275,90 322,48 C375,2 458,8 505,55 C545,95 545,155 515,200"
        fill="none" stroke="#0096d1" stroke-width="1" opacity="0.08" stroke-linecap="round"/>

  <!-- Center: origin -->
  <circle cx="400" cy="120" r="4" fill="#0096d1" opacity="0.3"/>
  <text x="400" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="middle" class="fg-4">v1.0</text>

  <!-- Milestone markers along spiral -->
  <!-- First turn: basic platform -->
  <circle cx="430" cy="100" r="5" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.6" opacity="0.3"/>
  <text x="445" y="94" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">DockerSpawner</text>

  <!-- Second turn: self-service -->
  <circle cx="370" cy="72" r="6" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="0.6" opacity="0.35"/>
  <text x="348" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Self-service</text>

  <!-- Third turn: activity monitor -->
  <circle cx="455" cy="78" r="6" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.7" opacity="0.35"/>
  <text x="475" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Activity Monitor</text>

  <!-- Fourth turn: notifications -->
  <circle cx="338" cy="168" r="5.5" fill="#da8230" fill-opacity="0.05" stroke="#da8230" stroke-width="0.6" opacity="0.3"/>
  <text x="310" y="175" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="end" class="fg-3">Notifications</text>

  <!-- Fifth turn: stellars_hub package -->
  <circle cx="350" cy="52" r="7" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.7" opacity="0.35"/>
  <text x="330" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="end" class="fg-2">stellars_hub</text>

  <!-- Sixth turn: mobile + branding -->
  <circle cx="480" cy="62" r="7" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="0.7" opacity="0.3"/>
  <text x="500" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-2">Mobile UI</text>

  <!-- Outer: future -->
  <circle cx="505" cy="55" r="5" fill="#0096d1" fill-opacity="0.03" stroke="#0096d1" stroke-width="0.5" opacity="0.15" stroke-dasharray="2,2"/>
  <text x="525" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Kubernetes</text>

  <!-- Growth particles along spiral -->
  <circle cx="420" cy="138" r="1" fill="#0096d1" opacity="0.1"/>
  <circle cx="385" cy="155" r="0.8" fill="#da8230" opacity="0.08"/>
  <circle cx="445" cy="172" r="1.2" fill="#0096d1" opacity="0.06"/>
  <circle cx="308" cy="132" r="0.8" fill="#da8230" opacity="0.06"/>
  <circle cx="465" cy="150" r="1" fill="#0096d1" opacity="0.08"/>

  <!-- Labels -->
  <text x="400" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle" class="fg-1">Three years of iterative development - each turn adds capabilities</text>

  <!-- Year markers -->
  <text x="80" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4">Year 1</text>
  <text x="80" y="134" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Foundation</text>
  <line x1="110" y1="120" x2="395" y2="120" stroke="#0096d1" stroke-width="0.2" opacity="0.06"/>

  <text x="650" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4">Year 3</text>
  <text x="650" y="94" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">40+ features</text>
  <text x="650" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Teams worldwide</text>
  <line x1="520" y1="90" x2="645" y2="90" stroke="#0096d1" stroke-width="0.2" opacity="0.06"/>
</svg>
