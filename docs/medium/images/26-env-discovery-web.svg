<!--
  26-env-discovery-web.svg - Kernel auto-discovery as a web/net
  Left: spider web of discovered environments. Right: what the user sees.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
    }
  </style>

  <!-- LEFT: Discovery web -->
  <g id="web">
    <!-- Web rings -->
    <circle cx="190" cy="120" r="95" fill="none" stroke="#0096d1" stroke-width="0.3" opacity="0.08"/>
    <circle cx="190" cy="120" r="65" fill="none" stroke="#0096d1" stroke-width="0.4" opacity="0.12"/>
    <circle cx="190" cy="120" r="35" fill="none" stroke="#0096d1" stroke-width="0.5" opacity="0.18"/>

    <!-- Web radials -->
    <line x1="190" y1="120" x2="190" y2="22" stroke="#0096d1" stroke-width="0.3" opacity="0.1"/>
    <line x1="190" y1="120" x2="278" y2="60" stroke="#0096d1" stroke-width="0.3" opacity="0.1"/>
    <line x1="190" y1="120" x2="285" y2="120" stroke="#0096d1" stroke-width="0.3" opacity="0.1"/>
    <line x1="190" y1="120" x2="278" y2="180" stroke="#0096d1" stroke-width="0.3" opacity="0.1"/>
    <line x1="190" y1="120" x2="190" y2="218" stroke="#0096d1" stroke-width="0.3" opacity="0.1"/>
    <line x1="190" y1="120" x2="102" y2="180" stroke="#0096d1" stroke-width="0.3" opacity="0.1"/>
    <line x1="190" y1="120" x2="95" y2="120" stroke="#0096d1" stroke-width="0.3" opacity="0.1"/>
    <line x1="190" y1="120" x2="102" y2="60" stroke="#0096d1" stroke-width="0.3" opacity="0.1"/>

    <!-- Caught environments (nodes on the web) -->
    <!-- conda base - on inner ring -->
    <circle cx="190" cy="85" r="6" fill="#0096d1" fill-opacity="0.1" stroke="#0096d1" stroke-width="0.8" opacity="0.5"/>
    <text x="190" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="middle" class="fg-3">conda:base</text>

    <!-- conda torch - on mid ring -->
    <circle cx="245" cy="82" r="5" fill="#da8230" fill-opacity="0.08" stroke="#da8230" stroke-width="0.7" opacity="0.45"/>
    <text x="262" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">conda:torch</text>

    <!-- uv venv project-1 - on outer ring -->
    <circle cx="270" cy="120" r="5.5" fill="#da8230" fill-opacity="0.08" stroke="#da8230" stroke-width="0.7" opacity="0.4"/>
    <text x="286" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">uv:project-1</text>

    <!-- conda tf - on mid ring -->
    <circle cx="245" cy="158" r="5" fill="#da8230" fill-opacity="0.08" stroke="#da8230" stroke-width="0.7" opacity="0.45"/>
    <text x="264" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">conda:tf</text>

    <!-- venv project-2 - on outer ring -->
    <circle cx="190" cy="200" r="5" fill="#da8230" fill-opacity="0.08" stroke="#da8230" stroke-width="0.7" opacity="0.35"/>
    <text x="190" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="middle" class="fg-4">venv:project-2</text>

    <!-- R kernel - on mid ring -->
    <circle cx="135" cy="158" r="4.5" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.6" opacity="0.35"/>
    <text x="115" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="end" class="fg-4">conda:r</text>

    <!-- venv experiment - on outer ring -->
    <circle cx="110" cy="120" r="4" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="0.5" opacity="0.3"/>
    <text x="90" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="end" class="fg-4">venv:exp</text>

    <!-- Scanner center -->
    <circle cx="190" cy="120" r="10" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="1" opacity="0.35"/>
    <circle cx="190" cy="120" r="3" fill="#0096d1" opacity="0.4"/>
    <text x="190" y="136" font-family="Segoe UI, Arial, sans-serif" font-size="7" font-weight="600" text-anchor="middle" class="fg-2">scanner</text>
  </g>

  <!-- Arrow connecting web to card -->
  <path d="M290,120 L380,120" fill="none" stroke="#0096d1" stroke-width="0.8" opacity="0.2"/>
  <polygon points="380,117 386,120 380,123" fill="#0096d1" opacity="0.3"/>
  <text x="335" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="middle" class="fg-4">auto-register</text>

  <!-- RIGHT: What user sees (kernel picker card) -->
  <g id="kernel-card">
    <path d="M394,16 H780 V224 Q780,228 776,228 H398 Q394,228 394,224 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M394,16 H780 V224 Q780,228 776,228 H398 Q394,228 394,224 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="394" y="16" width="386" height="5" fill="#0096d1" opacity="0.6"/>

    <text x="408" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1" fill="#0096d1">KERNEL PICKER</text>
    <text x="408" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1">Select environment</text>

    <!-- Kernel list items -->
    <rect x="408" y="64" width="352" height="20" rx="3" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.6"/>
    <circle cx="422" cy="74" r="3" fill="#0096d1" opacity="0.4"/>
    <text x="432" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Python 3.12 (base)</text>
    <text x="620" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">conda</text>

    <rect x="408" y="90" width="352" height="20" rx="3" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.5"/>
    <circle cx="422" cy="100" r="3" fill="#da8230" opacity="0.35"/>
    <text x="432" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-2">PyTorch 2.4 (torch)</text>
    <text x="620" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">conda</text>

    <rect x="408" y="116" width="352" height="20" rx="3" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.5"/>
    <circle cx="422" cy="126" r="3" fill="#da8230" opacity="0.35"/>
    <text x="432" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-2">TensorFlow 2.18 (tf)</text>
    <text x="620" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">conda</text>

    <rect x="408" y="142" width="352" height="20" rx="3" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.5"/>
    <circle cx="422" cy="152" r="3" fill="#da8230" opacity="0.3"/>
    <text x="432" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">project-1 (.venv)</text>
    <text x="620" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">uv</text>

    <rect x="408" y="168" width="352" height="20" rx="3" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.5"/>
    <circle cx="422" cy="178" r="3" fill="#da8230" opacity="0.3"/>
    <text x="432" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">project-2 (.venv)</text>
    <text x="620" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">venv</text>

    <rect x="408" y="194" width="352" height="20" rx="3" fill="#0096d1" fill-opacity="0.03" stroke="#0096d1" stroke-width="0.4"/>
    <circle cx="422" cy="204" r="3" fill="#0096d1" opacity="0.25"/>
    <text x="432" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">R 4.x (r_base)</text>
    <text x="620" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">conda</text>

    <text x="408" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">All discovered automatically by nb_venv_kernels - no registration needed</text>
  </g>
</svg>
