<!--
  31-k8s-horizon.svg - Kubernetes as the horizon ahead
  Left: current Docker Compose landscape. Right: K8s horizon with info card.
  A path leads from present to future.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
    }
  </style>

  <!-- Horizon line -->
  <line x1="0" y1="110" x2="800" y2="110" stroke="#0096d1" stroke-width="0.4" opacity="0.1"/>

  <!-- Ground plane (perspective lines converging to vanishing point at ~650,110) -->
  <line x1="0" y1="170" x2="650" y2="110" stroke="#0096d1" stroke-width="0.2" opacity="0.06"/>
  <line x1="0" y1="150" x2="650" y2="110" stroke="#0096d1" stroke-width="0.2" opacity="0.06"/>
  <line x1="0" y1="130" x2="650" y2="110" stroke="#0096d1" stroke-width="0.2" opacity="0.06"/>
  <line x1="100" y1="175" x2="650" y2="110" stroke="#0096d1" stroke-width="0.2" opacity="0.05"/>
  <line x1="200" y1="175" x2="650" y2="110" stroke="#0096d1" stroke-width="0.2" opacity="0.04"/>

  <!-- Present: Docker Compose boxes (near, large) -->
  <rect x="40" y="118" width="50" height="35" rx="3" fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="0.8" opacity="0.4"/>
  <text x="65" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle" class="fg-3">Hub</text>

  <rect x="100" y="122" width="45" height="30" rx="3" fill="#da8230" fill-opacity="0.05" stroke="#da8230" stroke-width="0.7" opacity="0.35"/>
  <text x="122" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="middle" class="fg-4">Traefik</text>

  <rect x="155" y="126" width="40" height="26" rx="3" fill="#0096d1" fill-opacity="0.05" stroke="#0096d1" stroke-width="0.6" opacity="0.3"/>
  <text x="175" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="6" text-anchor="middle" class="fg-4">Lab</text>

  <rect x="205" y="130" width="35" height="22" rx="3" fill="#0096d1" fill-opacity="0.04" stroke="#0096d1" stroke-width="0.5" opacity="0.25"/>
  <text x="222" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="5" text-anchor="middle" class="fg-4">Lab</text>

  <!-- Path to horizon (road) -->
  <path d="M140,165 C250,155 400,130 650,112" fill="none" stroke="#0096d1" stroke-width="1.5" opacity="0.12"/>
  <path d="M160,168 C270,158 410,135 650,115" fill="none" stroke="#0096d1" stroke-width="0.8" opacity="0.08"/>

  <!-- Future: K8s glow at vanishing point -->
  <defs>
    <radialGradient id="k8glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#da8230" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#da8230" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="650" cy="105" rx="80" ry="40" fill="url(#k8glow)"/>

  <!-- K8s symbol suggestion (hexagonal hint) -->
  <polygon points="650,82 668,92 668,110 650,120 632,110 632,92" fill="none" stroke="#da8230" stroke-width="0.8" opacity="0.25"/>
  <polygon points="650,88 660,94 660,108 650,114 640,108 640,94" fill="none" stroke="#da8230" stroke-width="0.5" opacity="0.15"/>
  <circle cx="650" cy="101" r="3" fill="#da8230" opacity="0.3"/>

  <!-- Labels -->
  <text x="120" y="102" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Docker Compose</text>
  <text x="120" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">single server, works today</text>

  <text x="650" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle" class="fg-1">Kubernetes</text>

  <!-- RIGHT: small info card -->
  <g id="k8s-info">
    <path d="M690,68 H790 V160 Q790,163 787,163 H693 Q690,163 690,160 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M690,68 H790 V160 Q790,163 787,163 H693 Q690,163 690,160 Z" fill="none" stroke="#da8230" stroke-width="0.6"/>
    <rect x="690" y="68" width="100" height="4" fill="#da8230" opacity="0.4"/>
    <text x="700" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Elastic scaling</text>
    <text x="700" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Per-user quotas</text>
    <text x="700" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">GPU node affinity</text>
    <text x="700" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Helm deployment</text>
    <text x="700" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Same images</text>
    <text x="700" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Same ecosystem</text>
  </g>
</svg>
