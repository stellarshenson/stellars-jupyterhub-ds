    <rect x="10" y="158" width="380" height="4" fill="#0096d1" opacity="0.15"/>

    <text x="200" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle" class="fg-1">stellars-jupyterhub-ds</text>
    <text x="200" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle" class="fg-3">Hub orchestration and user management</text>

