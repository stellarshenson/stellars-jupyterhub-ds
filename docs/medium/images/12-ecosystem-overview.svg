      <text x="212" y="304" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Custom Branding</text>
      <text x="212" y="316" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Logo, favicon, splash icons</text>
