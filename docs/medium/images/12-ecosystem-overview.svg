<!--
  12-ecosystem-overview.svg - Full platform ecosystem bird's eye view
  Shows: Central "Stellars DS Platform" hub with two major branches.
  Left branch: stellars-jupyterhub-ds (Hub) with NativeAuthenticator, DockerSpawner,
  Activity Monitor, Notifications, Session Extension, Groups, Branding.
  Right branch: stellars-jupyterlab-ds (Lab) with MLflow, TensorBoard, Lab Utilities,
  Custom Extensions, Conda Environments, Fish Shell, GPU/CUDA.
  Bottom: Shared infrastructure (Docker, Traefik, Watchtower, CIFS/NAS, Volumes).
  Top: Users (data scientists, ML engineers, researchers).
  Intent: bird's eye view of the complete ecosystem - the hero diagram.
  Theme: Stellars-Tech derived - accent-1=#0096d1 hub/infra, accent-2=#da8230 lab/services.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }
    .on-fill { fill: #e0f2f7; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }
      .on-fill { fill: #e0f2f7; }
    }
  </style>

  <!-- === GRID ===
    viewBox: 800x480
    Margins: left=10, right=790, top=10, bottom=476

    Users row: y=10..50, cx=400
    User pills: 3 pills centered

    Arrow: users(400,50) -> hub(400,80)

    Central hub: x=280, y=80, w=240, h=56, cx=400
    Hub accent bar: y=80, h=5

    Branch arrows:
      Hub left arm:  from (280,108) to (210,158) - chamfered L-route
      Hub right arm: from (520,108) to (590,158) - chamfered L-route

    Left branch (JupyterHub): x=10, y=158, w=370, h=236
      Container top: y=158
      Sub-cards (7 items, 2 columns):
        Col 1 x=20 w=170: items at y=192, 232, 272, 312
        Col 2 x=200 w=170: items at y=192, 232, 272

    Right branch (JupyterLab): x=420, y=158, w=370, h=236
      Container top: y=158
      Sub-cards (7 items, 2 columns):
        Col 1 x=430 w=170: items at y=192, 232, 272, 312
        Col 2 x=610 w=170: items at y=192, 232, 272

    Infrastructure bar: x=10, y=414, w=780, h=40

    Vertical rhythm: 14px
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    v-stack: users-row, centre-hub, branch-row, infra-bar
    h-stack: branch-row > hub-branch, lab-branch
    h-align: users-row, centre-hub (cx=400)
    flow: users -> centre-hub -> [hub-branch, lab-branch]
    flow: hub-branch -> infra-bar, lab-branch -> infra-bar
  === -->

  <g id="guide-grid" display="none">
    <line x1="400" y1="0" x2="400" y2="480" stroke="red" stroke-width="0.5"/>
  </g>

  <!-- ==================== USERS ROW ==================== -->
  <g id="users-row">
    <!-- Icon: users (Lucide, ISC license) -->
    <g transform="translate(330, 14) scale(0.583)" fill="none" stroke="#0096d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </g>
    <text x="356" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Data Scientists</text>
    <text x="440" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">ML Engineers</text>
    <text x="530" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Researchers</text>
    <text x="400" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" text-anchor="middle" letter-spacing="1" class="fg-4">USERS</text>
  </g>

  <!-- Arrow: users -> hub -->
  <line x1="400" y1="50" x2="400" y2="76" stroke="#0096d1" stroke-width="1.2" opacity="0.3"/>
  <polygon points="397,76 400,80 403,76" fill="#0096d1" opacity="0.5"/>

  <!-- ==================== CENTRAL HUB ==================== -->
  <g id="centre-hub">
    <path d="M280,80 H520 V133 Q520,136 517,136 H283 Q280,136 280,133 Z" fill="#0096d1" fill-opacity="0.06"/>
    <path d="M280,80 H520 V133 Q520,136 517,136 H283 Q280,136 280,133 Z" fill="none" stroke="#0096d1" stroke-width="1.5"/>
    <rect x="280" y="80" width="240" height="5" fill="#0096d1" opacity="0.7"/>
    <text x="400" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" class="fg-1">Stellars DS Platform</text>
    <text x="400" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="9" text-anchor="middle" class="fg-3">Self-hosted multi-user data science ecosystem</text>
  </g>

  <!-- Branch arrows -->
  <!-- Hub left: (310,136) -> (200,158) chamfered L-route -->
  <path d="M310,136 V144 L306,148 H204 L200,152 V154" fill="none" stroke="#0096d1" stroke-width="1.2" opacity="0.3"/>
  <polygon points="197,154 200,158 203,154" fill="#0096d1" opacity="0.5"/>

  <!-- Hub right: (490,136) -> (600,158) chamfered L-route -->
  <path d="M490,136 V144 L494,148 H596 L600,152 V154" fill="none" stroke="#da8230" stroke-width="1.2" opacity="0.3"/>
  <polygon points="597,154 600,158 603,154" fill="#da8230" opacity="0.5"/>

