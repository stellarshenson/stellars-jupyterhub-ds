<!--
  13-friction-funnel.svg - Friction elimination funnel
  Shows: Wide mouth of friction points (left) narrowing through the platform
  into a focused output (right) of productive data science work.
  Uses organic funnel shape, not cards.
  Theme: Stellars-Tech
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
    }
  </style>

  <!-- Funnel shape - wide left, narrow right -->
  <path d="M40,20 C180,20 220,20 340,70 C420,100 440,100 480,110 L480,150 C440,160 420,160 340,190 C220,240 180,240 40,240 Z"
        fill="#c43030" fill-opacity="0.04" stroke="#c43030" stroke-width="0.8" opacity="0.5"/>

  <!-- Platform processing zone -->
  <path d="M340,70 C420,100 440,100 480,110 L580,110 C600,110 610,115 610,130 C610,145 600,150 580,150 L480,150 C440,160 420,160 340,190 Z"
        fill="#0096d1" fill-opacity="0.06" stroke="#0096d1" stroke-width="1"/>

  <!-- Output zone - narrow focused beam -->
  <path d="M610,110 L760,118 C770,120 770,140 760,142 L610,150 Z"
        fill="#1a8a4a" fill-opacity="0.06" stroke="#1a8a4a" stroke-width="0.8"/>

  <!-- Friction points (left side, scattered) -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="8">
    <circle cx="72" cy="52" r="3" fill="#c43030" opacity="0.3"/>
    <text x="82" y="55" class="fg-3">Broken environments</text>

    <circle cx="58" cy="82" r="3" fill="#c43030" opacity="0.25"/>
    <text x="68" y="85" class="fg-3">GPU driver conflicts</text>

    <circle cx="80" cy="112" r="3" fill="#c43030" opacity="0.35"/>
    <text x="90" y="115" class="fg-3">Manual server restarts</text>

    <circle cx="55" cy="142" r="3" fill="#c43030" opacity="0.2"/>
    <text x="65" y="145" class="fg-3">Dependency hell</text>

    <circle cx="72" cy="172" r="3" fill="#c43030" opacity="0.3"/>
    <text x="82" y="175" class="fg-3">No experiment tracking</text>

    <circle cx="60" cy="202" r="3" fill="#c43030" opacity="0.25"/>
    <text x="70" y="205" class="fg-3">Idle resource waste</text>
  </g>

  <!-- Platform label (center) -->
  <text x="460" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" text-anchor="middle" class="fg-1">Stellars</text>
  <text x="460" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="8" text-anchor="middle" class="fg-2">Platform</text>

  <!-- Output labels (right side) -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="9">
    <text x="640" y="128" font-weight="600" class="fg-1">Productive</text>
    <text x="640" y="142" font-weight="600" class="fg-1">Data Science</text>
  </g>

  <!-- Flow arrows inside funnel -->
  <g stroke="#0096d1" stroke-width="0.4" opacity="0.2" fill="none">
    <path d="M200,60 C280,80 350,95 420,108"/>
    <path d="M180,130 C260,130 350,125 420,122"/>
    <path d="M200,200 C280,180 350,165 420,148"/>
  </g>

  <!-- Tiny sparkle dots at output -->
  <circle cx="740" cy="125" r="1.5" fill="#1a8a4a" opacity="0.4"/>
  <circle cx="750" cy="135" r="1" fill="#1a8a4a" opacity="0.3"/>
  <circle cx="735" cy="140" r="1.2" fill="#1a8a4a" opacity="0.35"/>

  <!-- Labels -->
  <text x="120" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle" class="fg-4">Friction Points</text>
  <text x="460" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle" class="fg-4">40+ enhancements</text>
  <text x="690" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="7" text-anchor="middle" class="fg-4">Focus</text>
</svg>
