<!--
  09-vanilla-vs-stellars.svg - Vanilla foundation + Stellars additions
  Shows: Two cards - left shows solid vanilla JupyterLab/Hub foundation,
  right shows capabilities added by the Stellars ecosystem on top.
  Intent: Positive framing - vanilla is a great base, Stellars extends it.
  Theme: Stellars-Tech derived - accent-1=#0096d1 Stellars, accent-2=#da8230 vanilla.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }
    .on-fill { fill: #e0f2f7; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }
      .on-fill { fill: #e0f2f7; }
    }
  </style>

  <!-- === GRID ===
    viewBox: 800x320
    Left card (Foundation): x=16, y=10, w=378, h=300
    Right card (Added): x=406, y=10, w=378, h=300
  === -->

  <!-- === LAYOUT TOPOLOGY ===
    h-stack: foundation-card, additions-card
  === -->

  <!-- Foundation Card (Vanilla) -->
  <path d="M16,10 H394 V307 Q394,310 391,310 H19 Q16,310 16,307 Z" fill="#da8230" fill-opacity="0.04"/>
  <path d="M16,10 H394 V307 Q394,310 391,310 H19 Q16,310 16,307 Z" fill="none" stroke="#da8230" stroke-width="1"/>
  <rect x="16" y="10" width="378" height="5" fill="#da8230" opacity="0.6"/>

  <text x="30" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1" fill="#da8230">SOLID FOUNDATION</text>
  <text x="30" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1">Vanilla JupyterHub 5 + JupyterLab 4</text>

  <!-- JupyterHub features -->
  <text x="30" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">JupyterHub</text>

  <text x="30" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a8a4a">&#x2713;</text>
  <text x="46" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Multi-user authentication</text>

  <text x="30" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a8a4a">&#x2713;</text>
  <text x="46" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Container spawning (DockerSpawner)</text>

  <text x="30" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a8a4a">&#x2713;</text>
  <text x="46" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Admin panel with user management</text>

  <text x="30" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a8a4a">&#x2713;</text>
  <text x="46" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Configurable HTTP proxy</text>

  <!-- JupyterLab features -->
  <text x="30" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">JupyterLab</text>

  <text x="30" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a8a4a">&#x2713;</text>
  <text x="46" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Notebook interface with kernels</text>

  <text x="30" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a8a4a">&#x2713;</text>
  <text x="46" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">File browser and terminal</text>

  <text x="30" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a8a4a">&#x2713;</text>
  <text x="46" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Extension system and themes</text>

  <text x="30" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#1a8a4a">&#x2713;</text>
  <text x="46" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Markdown and CSV viewers</text>

  <text x="30" y="284" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4">A great base for building on top of</text>

  <!-- Arrow between cards -->
  <g transform="translate(406,160) rotate(0)">
    <line x1="-14" y1="0" x2="-6" y2="0" stroke="#0096d1" stroke-width="1.5" opacity="0.5"/>
    <polygon points="0,0 -6,-4 -6,4" fill="#0096d1" opacity="0.6"/>
  </g>

  <!-- Additions Card (Stellars) -->
  <path d="M406,10 H784 V307 Q784,310 781,310 H409 Q406,310 406,307 Z" fill="#0096d1" fill-opacity="0.04"/>
  <path d="M406,10 H784 V307 Q784,310 781,310 H409 Q406,310 406,307 Z" fill="none" stroke="#0096d1" stroke-width="1.5"/>
  <rect x="406" y="10" width="378" height="5" fill="#0096d1" opacity="0.6"/>

  <text x="420" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1" fill="#0096d1">ADDED BY STELLARS</text>
  <text x="420" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1">40+ Enhancement Categories</text>

  <text x="420" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Self-service server controls + volume reset</text>

  <text x="420" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Activity Monitor with engagement scoring</text>

  <text x="420" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Notification broadcast to all sessions</text>

  <text x="420" y="136" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="136" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">GPU auto-detection (3-mode)</text>

  <text x="420" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Per-user MLflow, TensorBoard, btop</text>

  <text x="420" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">On-demand TensorFlow / PyTorch / R / Rust</text>

  <text x="420" y="196" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="196" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Auto kernel discovery (conda/venv/uv)</text>

  <text x="420" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Custom dark themes (Sublime, Darcula)</text>

  <text x="420" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Lab Utilities menu + project scaffolding</text>

  <text x="420" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Group-based Docker access control</text>

  <text x="420" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#0096d1">+</text>
  <text x="436" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-2">Custom branding + session extension</text>

  <text x="420" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4">All configurable via environment variables</text>

</svg>
