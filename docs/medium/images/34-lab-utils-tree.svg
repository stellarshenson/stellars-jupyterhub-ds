<!--
  34-lab-utils-tree.svg - Lab Utilities as a decision tree / mind map
  Left: organic branching menu tree. Right: what each branch offers.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
    }
  </style>

  <!-- LEFT: Mind map tree -->
  <g id="menu-tree">
    <!-- Root -->
    <circle cx="60" cy="120" r="16" fill="#0096d1" fill-opacity="0.08" stroke="#0096d1" stroke-width="1.2" opacity="0.5"/>
    <circle cx="60" cy="120" r="5" fill="#0096d1" opacity="0.35"/>
    <text x="60" y="146" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" text-anchor="middle" class="fg-1">lab-utils</text>

    <!-- Branch 1: Environments (top) -->
    <path d="M76,112 C110,90 130,60 175,40" stroke="#da8230" stroke-width="1.2" fill="none" opacity="0.2" stroke-linecap="round"/>
    <circle cx="180" cy="38" r="10" fill="#da8230" fill-opacity="0.06" stroke="#da8230" stroke-width="0.8" opacity="0.4"/>
    <text x="180" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="6" font-weight="600" text-anchor="middle" class="fg-2">Envs</text>
    <!-- Sub-branches -->
    <path d="M190,35 C210,28 225,22 245,20" stroke="#da8230" stroke-width="0.5" fill="none" opacity="0.12"/>
    <circle cx="250" cy="19" r="3" fill="#da8230" opacity="0.15"/>
    <text x="258" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">TF</text>
    <path d="M190,40 C210,38 225,36 245,36" stroke="#da8230" stroke-width="0.5" fill="none" opacity="0.12"/>
    <circle cx="250" cy="35" r="3" fill="#da8230" opacity="0.15"/>
    <text x="258" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">PyTorch</text>
    <path d="M190,44 C210,50 225,54 245,55" stroke="#da8230" stroke-width="0.5" fill="none" opacity="0.12"/>
    <circle cx="250" cy="54" r="3" fill="#da8230" opacity="0.15"/>
    <text x="258" y="57" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">R / Rust</text>

    <!-- Branch 2: Git (upper-mid) -->
    <path d="M76,116 C110,100 140,90 175,85" stroke="#0096d1" stroke-width="1" fill="none" opacity="0.18" stroke-linecap="round"/>
    <circle cx="180" cy="84" r="9" fill="#0096d1" fill-opacity="0.05" stroke="#0096d1" stroke-width="0.7" opacity="0.35"/>
    <text x="180" y="87" font-family="Segoe UI, Arial, sans-serif" font-size="6" font-weight="600" text-anchor="middle" class="fg-3">Git</text>
    <path d="M189,82 C210,78 230,76 248,76" stroke="#0096d1" stroke-width="0.4" fill="none" opacity="0.1"/>
    <text x="254" y="79" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">pull / push / commit</text>

    <!-- Branch 3: AI (middle) -->
    <path d="M76,122 C120,122 145,122 175,122" stroke="#da8230" stroke-width="1" fill="none" opacity="0.18" stroke-linecap="round"/>
    <circle cx="180" cy="122" r="9" fill="#da8230" fill-opacity="0.05" stroke="#da8230" stroke-width="0.7" opacity="0.35"/>
    <text x="180" y="125" font-family="Segoe UI, Arial, sans-serif" font-size="6" font-weight="600" text-anchor="middle" class="fg-3">AI</text>
    <path d="M189,119 C210,115 230,112 248,112" stroke="#da8230" stroke-width="0.4" fill="none" opacity="0.1"/>
    <text x="254" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">Claude Code</text>
    <path d="M189,125 C210,128 230,132 248,132" stroke="#da8230" stroke-width="0.4" fill="none" opacity="0.1"/>
    <text x="254" y="135" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">Cursor / Gemini</text>

    <!-- Branch 4: Projects (lower-mid) -->
    <path d="M76,128 C110,142 140,155 175,162" stroke="#0096d1" stroke-width="1" fill="none" opacity="0.18" stroke-linecap="round"/>
    <circle cx="180" cy="162" r="9" fill="#0096d1" fill-opacity="0.05" stroke="#0096d1" stroke-width="0.7" opacity="0.35"/>
    <text x="180" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="5.5" font-weight="600" text-anchor="middle" class="fg-3">Projects</text>
    <path d="M189,160 C210,158 230,156 248,156" stroke="#0096d1" stroke-width="0.4" fill="none" opacity="0.1"/>
    <text x="254" y="159" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">copier-data-science</text>

    <!-- Branch 5: Docker (bottom) -->
    <path d="M76,130 C105,160 130,190 175,205" stroke="#da8230" stroke-width="1" fill="none" opacity="0.15" stroke-linecap="round"/>
    <circle cx="180" cy="205" r="8" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.6" opacity="0.3"/>
    <text x="180" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="5.5" font-weight="600" text-anchor="middle" class="fg-4">Docker</text>
    <path d="M188,204 C210,202 228,201 245,201" stroke="#da8230" stroke-width="0.4" fill="none" opacity="0.08"/>
    <text x="250" y="204" font-family="Segoe UI, Arial, sans-serif" font-size="6" class="fg-4">CLI + MCP</text>
  </g>

  <!-- RIGHT: Details card -->
  <g id="utils-card">
    <path d="M310,12 H780 V228 Q780,232 776,232 H314 Q310,232 310,228 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M310,12 H780 V228 Q780,232 776,232 H314 Q310,232 310,228 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="310" y="12" width="470" height="5" fill="#0096d1" opacity="0.6"/>

    <text x="324" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1" fill="#0096d1">LAB UTILITIES</text>
    <text x="324" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1">15 scripts across 5 categories</text>
    <text x="324" y="66" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">YAML-driven interactive dialog system inside every container</text>

    <!-- Category rows -->
    <rect x="324" y="78" width="442" height="24" rx="3" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.5"/>
    <circle cx="338" cy="90" r="3" fill="#da8230" opacity="0.3"/>
    <text x="348" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="fg-2">Environments</text>
    <text x="440" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Install TensorFlow, PyTorch, R, Rust on demand</text>
    <text x="348" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Separate conda envs per framework - no conflicts</text>

    <rect x="324" y="108" width="442" height="24" rx="3" fill="#0096d1" fill-opacity="0.03" stroke="#0096d1" stroke-width="0.4"/>
    <circle cx="338" cy="120" r="3" fill="#0096d1" opacity="0.25"/>
    <text x="348" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="fg-2">Git Workflows</text>
    <text x="440" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Pull, push, commit repos, update submodules</text>
    <text x="348" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Batch operations across multiple repositories</text>

    <rect x="324" y="138" width="442" height="24" rx="3" fill="#da8230" fill-opacity="0.04" stroke="#da8230" stroke-width="0.5"/>
    <circle cx="338" cy="150" r="3" fill="#da8230" opacity="0.3"/>
    <text x="348" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="fg-2">AI Assistants</text>
    <text x="440" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">Claude Code, Cursor, Gemini CLI, OpenAI Codex</text>
    <text x="348" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">One-command installers for coding AI tools</text>

    <rect x="324" y="168" width="442" height="24" rx="3" fill="#0096d1" fill-opacity="0.03" stroke="#0096d1" stroke-width="0.4"/>
    <circle cx="338" cy="180" r="3" fill="#0096d1" opacity="0.25"/>
    <text x="348" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="fg-2">Project Scaffolding</text>
    <text x="470" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-3">copier-data-science templates with uv</text>
    <text x="348" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Standardized structure across the team</text>

    <rect x="324" y="198" width="442" height="24" rx="3" fill="#da8230" fill-opacity="0.03" stroke="#da8230" stroke-width="0.4"/>
    <circle cx="338" cy="210" r="3" fill="#da8230" opacity="0.2"/>
    <text x="348" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="fg-3">Docker Tools</text>
    <text x="440" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">CLI + MCP Gateway + Buildx plugin</text>
    <text x="348" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Built from source in Docker image builder stage</text>
  </g>
</svg>
