<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/brand/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimum Hub</title>
    <script>
      // pre-paint theme guard: set data-theme + the page bg before React mounts
      // so there is no light/dark flash. The full var set is applied by ThemeProvider.
      try {
        var m = localStorage.getItem('optimum-hub-theme');
        var d = window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = m === 'dark' || m === 'optimum-hub-dark' || ((m === 'system' || !m) && d);
        var el = document.documentElement;
        el.setAttribute('data-theme', dark ? 'optimum-hub-dark' : 'optimum-hub-light');
        el.style.colorScheme = dark ? 'dark' : 'light';
        el.style.background = dark ? '#252b32' : '#f5f7fa';
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
