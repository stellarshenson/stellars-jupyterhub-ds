<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="{{ base_url }}portal/brand/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimum Hub</title>
    <script>
      // pre-paint theme guard (mirrors optimum-hub-web/index.html): set
      // data-theme + the page bg before React mounts so there is no flash.
      try {
        var m = localStorage.getItem('optimum-hub-theme');
        var d = window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = m === 'dark' || m === 'optimum-hub-dark' || ((m === 'system' || !m) && d);
        var el = document.documentElement;
        el.setAttribute('data-theme', dark ? 'optimum-hub-dark' : 'optimum-hub-light');
        el.style.colorScheme = dark ? 'dark' : 'light';
        el.style.background = dark ? '#252b32' : '#f5f7fa';
      } catch (e) {}
    </script>
    <script>
      // Identity + hub-signed XSRF submit-token the SPA reads (services/hub/client.ts).
      // render_template injects xsrf_token / base_url / prefix / user; admin_access
      // is passed by PortalHandler. This is the same mechanism page.html uses for
      // the stock admin React app.
      window.jhdata = {
        base_url: "{{ base_url }}",
        prefix: "{{ prefix }}",
        {% if user %}user: "{{ user.json_escaped_name | safe }}",{% endif %}
        admin_access: {% if admin_access %}true{% else %}false{% endif %},
        xsrf_token: "{{ xsrf_token }}"
      };
    </script>
    {% if entry_css %}<link rel="stylesheet" crossorigin href="{{ base_url }}portal/{{ entry_css }}" />{% endif %}
  </head>
  <body>
    <div id="root"></div>
    {% if entry_js %}<script type="module" crossorigin src="{{ base_url }}portal/{{ entry_js }}"></script>{% endif %}
  </body>
</html>
