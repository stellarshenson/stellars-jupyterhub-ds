[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "optimum-hub-web"
version = "0.1.0"
description = "Optimum Hub - JupyterHub-served React portal (UI bundle + hub integration)"
requires-python = ">=3.10"
# Runtime integration rides on the hub's own deps (jupyterhub.handlers.BaseHandler,
# tornado) which are always present in the hub image - no extra runtime deps.
dependencies = []

[project.optional-dependencies]
test = ["pytest"]

# The built SPA bundle lives at optimum_hub_web/static/ and is gitignored
# (regenerated by `make assets` / the Docker web-builder stage). `artifacts`
# forces it into the wheel even though VCS ignores it. Templates ship normally.
[tool.hatch.build]
artifacts = ["optimum_hub_web/static/**"]

[tool.hatch.build.targets.wheel]
packages = ["optimum_hub_web"]
